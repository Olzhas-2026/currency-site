<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
body{
  margin:0;
  background:#0b1633;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.box{
  background:#1e2a55;
  padding:40px;
  border-radius:15px;
  text-align:center;
  width:300px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button{
  margin-top:15px;
  width:100%;
  padding:12px;
  background:#1e4ed8;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
  <h2>ADMIN LOGIN</h2>
  <input type="password" id="pass" placeholder="Password">
  <button onclick="login()">Кіру</button>
</div>

<script>
function login(){
  let p = document.getElementById("pass").value;

  if(p === "qazpost"){
    localStorage.setItem("auth","admin");
    window.location.href="index.html";
  } else {
    alert("❌ Қате пароль!");
  }
}
</script>

</body>
</html>
