<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0b1633;
  font-family:Arial;
  color:white;
}

.box{
  background:#1e2a55;
  padding:40px;
  border-radius:15px;
  width:300px;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  margin-top:15px;
  padding:10px;
  background:#1e4ed8;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2>ADMIN LOGIN</h2>

  <input type="password" id="pass" placeholder="Password">

  <button onclick="login()">Кіру</button>
</div>

<script>

function login(){

  let password = document.getElementById("pass").value;

  if(password === "qazpost"){
    localStorage.setItem("auth","admin");
    window.location.href = "index.html";
  } else {
    alert("❌ Қате пароль");
  }

}

</script>

</body>
</html>
