<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
      padding: 50px;
    }

    .box {
      background: white;
      width: 300px;
      margin: auto;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
    }

    input {
      width: 90%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>🔐 Admin Login</h2>

  <input type="password" id="pass" placeholder="Пароль">

  <button onclick="login()">Кіру</button>
</div>

<script>
function login() {
  const pass = document.getElementById("pass").value;

  if (pass === "1234") {
    localStorage.setItem("admin", "true");
    window.location.href = "admin.html";
  } else {
    alert("❌ Қате пароль");
  }
}
</script>

</body>
</html>
