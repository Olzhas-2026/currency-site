<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 50px;
}

.box {
  width: 300px;
  margin: auto;
  padding: 20px;
  box-shadow: 0 0 10px #ccc;
  border-radius: 10px;
}

input {
  width: 90%;
  padding: 10px;
  margin-top: 10px;
}

button {
  margin-top: 10px;
  padding: 10px;
}
</style>
</head>

<body>

<div class="box">
  <h2>🔐 Login</h2>

  <input type="password" id="pass" placeholder="Пароль">
  <button onclick="login()">Кіру</button>
</div>

<script>
function login() {
  if (document.getElementById("pass").value === "1234") {
    localStorage.setItem("admin","true");
    window.location.href = "admin.html";
  } else {
    alert("Қате пароль");
  }
}
</script>

</body>
</html>
