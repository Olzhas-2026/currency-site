<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>Login</title>
</head>

<body style="background:#0b1633;color:white;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial">

<div style="background:#1e2a55;padding:30px;border-radius:12px;text-align:center;width:300px">

<h2>LOGIN</h2>

<input id="pass" type="password" placeholder="password"
style="padding:10px;width:90%;margin-top:10px">

<br><br>

<button onclick="login()"
style="padding:10px 20px;background:#1e4ed8;color:white;border:none;border-radius:8px;cursor:pointer">
Кіру
</button>

</div>

<script>

function login(){

  let p = document.getElementById("pass").value;

  alert("clicked"); // 🔥 TEST (өте маңызды)

  if(p === "qazpost"){
    localStorage.setItem("auth","admin");
    window.location.href="index.html";
  } else {
    alert("қате пароль");
  }

}

</script>

</body>
</html>
