<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 30px;
}

.box {
  width: 300px;
  margin: auto;
  padding: 20px;
  border-radius: 10px;
  background: #111;
  color: white;
}

input {
  width: 90%;
  padding: 10px;
  margin: 5px;
}

button {
  padding: 10px;
  margin-top: 10px;
  width: 95%;
}

.logout {
  background: red;
  color: white;
}
</style>
</head>

<body>

<div class="box">
  <h2>💱 Admin Panel</h2>

  <input id="usd" placeholder="USD">
  <input id="eur" placeholder="EUR">
  <input id="rub" placeholder="RUB">

  <button onclick="save()">Сақтау</button>
  <button class="logout" onclick="logout()">Шығу</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "currency-live-d633e.firebaseapp.com",
  projectId: "currency-live-d633e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// login check
if (localStorage.getItem("admin") !== "true") {
  window.location.href = "login.html";
}

window.save = async function () {
  await setDoc(doc(db,"rates","Vt6Ibuny1gDsyRJfCKLx"), {
    usd: document.getElementById("usd").value,
    eur: document.getElementById("eur").value,
    rub: document.getElementById("rub").value
  });

  alert("Сақталды!");
}

window.logout = function () {
  localStorage.removeItem("admin");
  window.location.href = "login.html";
}

</script>

</body>
</html>
