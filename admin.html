<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>Admin</title>
<style>
body{background:#0b1633;color:white;font-family:Arial;text-align:center;padding:20px}

input{padding:8px;margin:5px;border-radius:6px;border:none}

button{padding:10px;background:#1e4ed8;color:white;border:none;border-radius:6px}
</style>
</head>

<body>

<h1>ADMIN PANEL 💰</h1>

<h3>USD</h3>
<input id="usdBuy" placeholder="Buy">
<input id="usdSell" placeholder="Sell">

<h3>EUR</h3>
<input id="eurBuy" placeholder="Buy">
<input id="eurSell" placeholder="Sell">

<h3>RUB</h3>
<input id="rubBuy" placeholder="Buy">
<input id="rubSell" placeholder="Sell">

<br><br>
<button onclick="save()">SAVE</button>

<script>

function save(){

  localStorage.setItem("usdBuy",usdBuy.value);
  localStorage.setItem("usdSell",usdSell.value);

  localStorage.setItem("eurBuy",eurBuy.value);
  localStorage.setItem("eurSell",eurSell.value);

  localStorage.setItem("rubBuy",rubBuy.value);
  localStorage.setItem("rubSell",rubSell.value);

  alert("Saved!");
}

</script>

</body>
</html>
