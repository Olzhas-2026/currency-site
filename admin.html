<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1633;
  color:white;
  text-align:center;
  padding:20px;
}

.box{
  max-width:400px;
  margin:auto;
  background:#1e2a55;
  padding:20px;
  border-radius:12px;
}

input{
  width:90%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:8px;
}

button{
  margin-top:10px;
  padding:10px 20px;
  background:#1e4ed8;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>ADMIN PANEL 💰</h1>

<div class="box">

<h3>USD</h3>
<input id="usdBuy" placeholder="Buy">
<input id="usdSell" placeholder="Sell">

<h3>EUR</h3>
<input id="eurBuy" placeholder="Buy">
<input id="eurSell" placeholder="Sell">

<h3>RUB</h3>
<input id="rubBuy" placeholder="Buy">
<input id="rubSell" placeholder="Sell">

<button onclick="save()">SAVE</button>

</div>

<script>

function save(){

  localStorage.setItem("usdBuy", document.getElementById("usdBuy").value);
  localStorage.setItem("usdSell", document.getElementById("usdSell").value);

  localStorage.setItem("eurBuy", document.getElementById("eurBuy").value);
  localStorage.setItem("eurSell", document.getElementById("eurSell").value);

  localStorage.setItem("rubBuy", document.getElementById("rubBuy").value);
  localStorage.setItem("rubSell", document.getElementById("rubSell").value);

  alert("💾 Saved!");

  window.location.href="index.html";
}

</script>

</body>
</html>
