<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<style>
body{
  background:#0b1633;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:20px;
}

input{
  padding:8px;
  margin:5px;
  border:none;
  border-radius:6px;
}

button{
  padding:10px;
  background:#1e4ed8;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>ADMIN 💰</h1>

<h3>USD</h3>
<input id="usdBuy" placeholder="Buy">
<input id="usdSell" placeholder="Sell">

<h3>EUR</h3>
<input id="eurBuy">
<input id="eurSell">

<h3>RUB</h3>
<input id="rubBuy">
<input id="rubSell">

<br><br>
<button onclick="save()">SAVE</button>

<script>

function save(){

  // 🔥 EMPTY CHECK FIX
  localStorage.setItem("usdBuy", usdBuy.value || "464");
  localStorage.setItem("usdSell", usdSell.value || "471");

  localStorage.setItem("eurBuy", eurBuy.value || "546");
  localStorage.setItem("eurSell", eurSell.value || "556");

  localStorage.setItem("rubBuy", rubBuy.value || "6.0");
  localStorage.setItem("rubSell", rubSell.value || "6.3");

  alert("💾 Saved!");

  // 🔥 FORCE UPDATE INDEX
  window.location.href = "index.html";
}

</script>

</body>
</html>
