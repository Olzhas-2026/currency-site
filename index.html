<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVE BANK VALYUTA</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#eef2f7,#dfe7f3);
  text-align:center;
  padding:20px;
}

.header{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  margin-bottom:20px;
}

.logo{
  width:40px;
  height:40px;
  background:#0057b8;
  border-radius:10px;
}

h1{
  color:#0057b8;
  font-size:22px;
  margin:0;
}

/* CARD */
.card{
  background:white;
  margin:12px auto;
  padding:18px;
  max-width:340px;
  border-radius:14px;
  border-left:6px solid #0057b8;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.title{
  font-size:20px;
  font-weight:bold;
  color:#0057b8;
}

.buy{color:green;font-weight:bold;}
.sell{color:red;font-weight:bold;}

/* ADMIN */
#admin{
  display:none;
  margin-top:20px;
  padding:15px;
  background:#111;
  color:white;
  max-width:340px;
  margin:auto;
  border-radius:12px;
}

input,button{
  width:90%;
  padding:10px;
  margin:6px;
  border-radius:8px;
  border:none;
}

button{
  background:#0057b8;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#004494;
}

.logout{
  background:red;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo"></div>
  <h1>LIVE BANK VALYUTA</h1>
</div>

<!-- VIEW -->
<div class="card">
  <div class="title">USD</div>
  <div class="buy">Сатып алу: <span id="usdBuy">...</span></div>
  <div class="sell">Сату: <span id="usdSell">...</span></div>
</div>

<div class="card">
  <div class="title">EUR</div>
  <div class="buy">Сатып алу: <span id="eurBuy">...</span></div>
  <div class="sell">Сату: <span id="eurSell">...</span></div>
</div>

<div class="card">
  <div class="title">RUB</div>
  <div class="buy">Сатып алу: <span id="rubBuy">...</span></div>
  <div class="sell">Сату: <span id="rubSell">...</span></div>
</div>

<hr>

<!-- LOGIN -->
<input type="password" id="pass" placeholder="Admin password">
<button onclick="login()">Login</button>

<!-- ADMIN -->
<div id="admin">

<h3>Admin Panel</h3>

<input id="usdBuyInput" placeholder="USD BUY">
<input id="usdSellInput" placeholder="USD SELL">

<input id="eurBuyInput" placeholder="EUR BUY">
<input id="eurSellInput" placeholder="EUR SELL">

<input id="rubBuyInput" placeholder="RUB BUY">
<input id="rubSellInput" placeholder="RUB SELL">

<button onclick="save()">Save</button>
<button class="logout" onclick="logout()">Logout</button>

<p id="status"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  doc,
  onSnapshot,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "currency-live-d633e.firebaseapp.com",
  projectId: "currency-live-d633e",
  storageBucket: "currency-live-d633e.firebasestorage.app",
  messagingSenderId: "1086647236449",
  appId: "1:1086647236449:web:df6eee1cdec5280ee1b720"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ref = doc(db, "rates", "Vt6Ibuny1gDsyRJfCKLx");

/* LIVE */
onSnapshot(ref, (snap)=>{
  const d = snap.data();

  document.getElementById("usdBuy").innerText = d.usdBuy;
  document.getElementById("usdSell").innerText = d.usdSell;

  document.getElementById("eurBuy").innerText = d.eurBuy;
  document.getElementById("eurSell").innerText = d.eurSell;

  document.getElementById("rubBuy").innerText = d.rubBuy;
  document.getElementById("rubSell").innerText = d.rubSell;
});

/* LOGIN */
window.login = function(){
  if(document.getElementById("pass").value === "1234"){
    document.getElementById("admin").style.display="block";
    document.getElementById("status").innerText="";
  }else{
    alert("Wrong password");
  }
};

/* SAVE */
window.save = async function(){

  const data = {
    usdBuy: Number(usdBuyInput.value)||0,
    usdSell: Number(usdSellInput.value)||0,

    eurBuy: Number(eurBuyInput.value)||0,
    eurSell: Number(eurSellInput.value)||0,

    rubBuy: Number(rubBuyInput.value)||0,
    rubSell: Number(rubSellInput.value)||0,
  };

  try{
    await updateDoc(ref,data);

    document.getElementById("status").innerText="✅ Saved!";

    // clear inputs
    document.querySelectorAll("#admin input").forEach(i=>i.value="");

  }catch(e){
    document.getElementById("status").innerText="❌ Error";
  }
};

/* LOGOUT */
window.logout = function(){
  document.getElementById("admin").style.display="none";
  document.getElementById("pass").value="";
};

</script>

</body>
</html>
