<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank Exchange System</title>

<style>

/* FULL SCREEN FIX */
html, body{
  height:100%;
  margin:0;
  font-family: Arial;
}

body{
  display:flex;
  background:#0b1633;
}

/* SIDEBAR */
.sidebar{
  width:280px;
  background:#07142e;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:30px 20px;
}

/* LOGO */
.logo{
  width:150px;
  margin-top:30px;
}

/* BRAND (KAZPOST → BANK) */
.brand{
  margin-top:15px;
  font-size:18px;
  font-weight:900;
  letter-spacing:2px;
  color:#00d4ff;
}

/* SUB TITLE */
.subtitle{
  font-size:11px;
  opacity:0.6;
  text-align:center;
}

/* QR */
.qr{
  margin-top:50px;
  width:140px;
  background:white;
  padding:10px;
  border-radius:10px;
}

/* FOOTER */
.side-footer{
  margin-top:auto;
  font-size:10px;
  opacity:0.5;
}

/* MAIN */
.main{
  flex:1;
  background:#f3f5f9;
  padding:25px 35px;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.title{
  font-size:34px;
  font-weight:900;
  color:#1e4ed8;
}

.time{
  font-size:14px;
  color:#666;
}

/* TABLE WRAPPER (CENTER FIX) */
.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 15px 35px rgba(0,0,0,0.12);

  width:100%;
  max-width:900px;
  margin:auto; /* 🔥 CENTER FIX */
}

/* HEADER ROW */
.row.header{
  background:#0f2a66;
  color:white;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  padding:18px 25px;
  font-size:13px;
  font-weight:700;
}

/* ROW */
.row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  padding:32px 25px;
  border-bottom:1px solid #eee;
  align-items:center;
}

/* TEXT */
.name{
  font-size:34px;
  font-weight:900;
  color:#111;
}

.buy{
  text-align:center;
  font-size:48px;
  font-weight:900;
  color:#16a34a;
}

.sell{
  text-align:right;
  font-size:48px;
  font-weight:900;
  color:#dc2626;
}

/* BOTTOM BRAND TEXT */
.bottom-text{
  text-align:center;
  margin-top:20px;
  font-size:12px;
  color:#666;
  letter-spacing:2px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/5/5b/Kazpost_logo.svg">

  <div class="brand">BANK SYSTEM</div>
  <div class="subtitle">EXCHANGE RATE MONITOR</div>

  <img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=https://your-site.com">

  <div class="side-footer">LIVE FINTECH SYSTEM</div>

</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
  <div class="title">LIVE VALYUTA</div>
  <div class="time" id="time">--:--</div>
</div>

<!-- TABLE -->
<div class="card">

  <div class="row header">
    <div>ВАЛЮТА</div>
    <div style="text-align:center">САТЫП АЛУ</div>
    <div style="text-align:right">САТУ</div>
  </div>

  <div class="row">
    <div class="name">USD</div>
    <div class="buy">464</div>
    <div class="sell">471</div>
  </div>

  <div class="row">
    <div class="name">EUR</div>
    <div class="buy">546</div>
    <div class="sell">556</div>
  </div>

  <div class="row">
    <div class="name">RUB</div>
    <div class="buy">6.0</div>
    <div class="sell">6.3</div>
  </div>

</div>

<!-- BOTTOM TEXT -->
<div class="bottom-text">
  CENTRAL BANK EXCHANGE MONITOR • REAL-TIME FINANCIAL DATA SYSTEM
</div>

</div>

<script>
setInterval(()=>{
  document.getElementById("time").innerText = new Date().toLocaleTimeString();
},1000);
</script>

</body>
</html>
