<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QAZPOST Exchange System</title>

<style>

html, body{
  height:100%;
  margin:0;
  font-family: Arial, sans-serif;
}

/* BACKGROUND */
body{
  display:flex;
  background:#0b1633;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#07142e;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:25px 15px;
}

/* SMALL LOGO */
.side-logo{
  width:120px;
  margin-top:20px;
}

/* BRAND */
.brand{
  margin-top:10px;
  font-size:18px;
  font-weight:900;
  color:#00d4ff;
}

/* MAIN AREA */
.main{
  flex:1;
  background:#f3f5f9;
  padding:25px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* HEADER */
.topbar{
  width:100%;
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.title{
  font-size:30px;
  font-weight:900;
  color:#1e4ed8;
}

.time{
  font-size:14px;
  color:#666;
}

/* 🔥 BIG CENTER LOGO */
.hero-logo{
  width:250px;
  margin:25px 0;
  filter:drop-shadow(0 0 20px rgba(0,212,255,0.6));
}

/* TABLE */
.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 15px 35px rgba(0,0,0,0.12);
  width:100%;
  max-width:900px;
}

/* HEADER ROW */
.row.header{
  background:#0f2a66;
  color:white;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  padding:18px;
  font-weight:700;
}

/* ROW */
.row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  padding:30px 20px;
  border-bottom:1px solid #eee;
  align-items:center;
}

/* TEXT */
.name{
  font-size:32px;
  font-weight:900;
}

.buy{
  text-align:center;
  font-size:42px;
  font-weight:900;
  color:#16a34a;
}

.sell{
  text-align:right;
  font-size:42px;
  font-weight:900;
  color:#dc2626;
}

/* MOTIVATION */
.bottom-text{
  margin-top:20px;
  text-align:center;
  color:#666;
  font-size:13px;
  line-height:1.6;
}

.motto{
  margin-top:10px;
  font-weight:700;
  color:#1e4ed8;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <img class="side-logo"
       src="https://upload.wikimedia.org/wikipedia/commons/5/5b/Kazpost_logo.svg">

  <div class="brand">QAZPOST</div>

</div>

<!-- MAIN -->
<div class="main">

<!-- TOP -->
<div class="topbar">
  <div class="title">LIVE VALYUTA</div>
  <div class="time" id="time">--:--</div>
</div>

<!-- 🔥 BIG CENTER LOGO -->
<img class="hero-logo"
     src="https://upload.wikimedia.org/wikipedia/commons/5/5b/Kazpost_logo.svg">

<!-- TABLE -->
<div class="card">

  <div class="row header">
    <div>ВАЛЮТА</div>
    <div style="text-align:center">САТЫП АЛУ</div>
    <div style="text-align:right">САТУ</div>
  </div>

  <div class="row">
    <div class="name">USD</div>
    <div class="buy">464</div>
    <div class="sell">471</div>
  </div>

  <div class="row">
    <div class="name">EUR</div>
    <div class="buy">546</div>
    <div class="sell">556</div>
  </div>

  <div class="row">
    <div class="name">RUB</div>
    <div class="buy">6.0</div>
    <div class="sell">6.3</div>
  </div>

</div>

<!-- MOTIVATION -->
<div class="bottom-text">

  💙 QAZPOST – сенімді қаржы серіктесі / надёжный финансовый партнёр<br>

  <div class="motto">
    “Болашағыңды бүгіннен басқар”
  </div>

</div>

</div>

<script>
setInterval(()=>{
  document.getElementById("time").innerText = new Date().toLocaleTimeString();
},1000);
</script>

</body>
</html>
