<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QAZPOST Exchange System</title>

<!-- 🔥 FONT FIX -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800;900&family=Noto+Sans+Display:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>

html, body{
  height:100%;
  margin:0;
  font-family:'Manrope','Noto Sans Display', sans-serif;
  background:#0b1633;
}

body{
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:280px;
  background:linear-gradient(180deg,#06122a,#071a3a);
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:30px 20px;
}

.logo{
  width:150px;
  margin-top:25px;
}

.brand{
  margin-top:15px;
  font-size:24px;
  font-weight:900;
  color:#00d4ff;
  letter-spacing:2px;
}

.subtitle{
  font-size:11px;
  opacity:0.6;
  text-align:center;
}

.qr{
  margin-top:50px;
  width:140px;
  background:white;
  padding:10px;
  border-radius:10px;
}

.side-footer{
  margin-top:auto;
  font-size:10px;
  opacity:0.5;
}

/* MAIN */
.main{
  flex:1;
  background:#f4f6fb;
  padding:25px 35px;
  display:flex;
  flex-direction:column;
}

/* TIME */
.topbar{
  display:flex;
  justify-content:flex-end;
  margin-bottom:10px;
}

.time{
  font-size:14px;
  color:#555;
  font-weight:600;
}

/* 🔥 BANNER (FIXED) */
.banner{
  background:linear-gradient(90deg,#0f2a66,#1e4ed8);
  color:white;
  padding:28px 20px;
  border-radius:14px;
  text-align:center;
  font-size:34px;
  font-weight:900;
  line-height:1.3;
  letter-spacing:0.2px;
  margin-bottom:12px;
}

/* 🔥 INFO (FIXED) */
.info{
  text-align:center;
  font-size:20px;
  font-weight:700;
  color:#1e4ed8;
  margin-bottom:25px;
}

/* TABLE */
.card{
  background:white;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 20px 45px rgba(0,0,0,0.12);
  width:100%;
  max-width:900px;
  margin:auto;
}

.row.header{
  background:#0f2a66;
  color:white;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  padding:18px 25px;
  font-size:14px;
  font-weight:800;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  padding:34px 25px;
  border-bottom:1px solid #eee;
  align-items:center;
}

/* NUMBERS */
.name{
  font-size:44px;
  font-weight:900;
  color:#111;
}

.buy{
  text-align:center;
  font-size:60px;
  font-weight:900;
  color:#16a34a;
}

.sell{
  text-align:right;
  font-size:60px;
  font-weight:900;
  color:#dc2626;
}

/* 🔥 SLOGAN FIX */
.slogan-box{
  margin-top:25px;
  text-align:center;
  padding:20px;
}

.slogan{
  font-size:24px;
  font-weight:800;
  color:#0f2a66;
  line-height:1.5;
}

.slogan span{
  display:block;
  font-size:19px;
  font-weight:600;
  color:#1e4ed8;
  margin-top:6px;
}

</style>
</head>

<body>

<div class="sidebar">

  <img class="logo"
       src="https://upload.wikimedia.org/wikipedia/commons/5/5b/Kazpost_logo.svg">

  <div class="brand">QAZPOST</div>
  <div class="subtitle">FINTECH EXCHANGE SYSTEM</div>

  <img class="qr"
       src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=https://your-site.com">

  <div class="side-footer">LIVE SYSTEM</div>

</div>

<div class="main">

<div class="topbar">
  <div class="time" id="time">--:--</div>
</div>

<!-- 🔥 BANNER -->
<div class="banner">
  QAZPOST – сенімді қаржы серіктесі / надёжный финансовый партнёр
</div>

<!-- 🔥 INFO -->
<div class="info">
  💡 Баға тиімді • Сенімді айырбас / Выгодный курс • Надёжный обмен
</div>

<div class="card">

  <div class="row header">
    <div>ВАЛЮТА</div>
    <div style="text-align:center">САТЫП АЛУ</div>
    <div style="text-align:right">САТУ</div>
  </div>

  <div class="row">
    <div class="name">USD</div>
    <div class="buy">464</div>
    <div class="sell">471</div>
  </div>

  <div class="row">
    <div class="name">EUR</div>
    <div class="buy">546</div>
    <div class="sell">556</div>
  </div>

  <div class="row">
    <div class="name">RUB</div>
    <div class="buy">6.0</div>
    <div class="sell">6.3</div>
  </div>

</div>

<div class="slogan-box">
  <div class="slogan">
    “Болашағыңды бүгіннен басқар”
    <span>/ Управляй будущим уже сегодня</span>
  </div>
</div>

</div>

<script>
setInterval(()=>{
  document.getElementById("time").innerText = new Date().toLocaleTimeString();
},1000);
</script>

</body>
</html>
