<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QAZPOST Exchange System</title>

<style>

html, body{
  height:100%;
  margin:0;
  font-family: Arial, sans-serif;
}

body{
  display:flex;
  background:#0b1633;
}

/* SIDEBAR */
.sidebar{
  width:280px;
  background:#07142e;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:30px 20px;
}

.logo{
  width:150px;
  margin-top:25px;
  filter: drop-shadow(0 0 12px rgba(0,212,255,0.5));
}

.brand{
  margin-top:15px;
  font-size:22px;
  font-weight:900;
  color:#00d4ff;
  letter-spacing:2px;
}

.subtitle{
  font-size:11px;
  opacity:0.6;
  text-align:center;
}

.qr{
  margin-top:50px;
  width:140px;
  background:white;
  padding:10px;
  border-radius:10px;
}

.side-footer{
  margin-top:auto;
  font-size:10px;
  opacity:0.5;
}

/* MAIN */
.main{
  flex:1;
  background:#f3f5f9;
  padding:25px 35px;
  display:flex;
  flex-direction:column;
}

/* TOP */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.time{
  font-size:14px;
  color:#666;
}

/* 🔥 BIG BANNER (ENLARGED) */
.banner{
  background:linear-gradient(90deg,#0f2a66,#1e4ed8);
  color:white;
  padding:28px 20px;
  border-radius:12px;
  text-align:center;
  font-size:30px;   /* 🔥 BIGGER */
  font-weight:900;
  margin-bottom:10px;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* 🔥 INFO LINE (ENLARGED) */
.info{
  text-align:center;
  font-size:18px;   /* 🔥 BIGGER */
  color:#1e4ed8;
  margin-bottom:25px;
  font-weight:800;
  letter-spacing:0.5px;
}

/* TABLE */
.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 15px 35px rgba(0,0,0,0.12);
  width:100%;
  max-width:900px;
  margin:auto;
}

/* HEADER */
.row.header{
  background:#0f2a66;
  color:white;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  padding:18px 25px;
  font-size:14px;
  font-weight:700;
}

/* ROW */
.row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  padding:34px 25px;
  border-bottom:1px solid #eee;
  align-items:center;
}

/* TEXT BIGGER */
.name{
  font-size:42px;   /* 🔥 BIGGER */
  font-weight:900;
  color:#111;
}

.buy{
  text-align:center;
  font-size:58px;   /* 🔥 BIGGER */
  font-weight:900;
  color:#16a34a;
}

.sell{
  text-align:right;
  font-size:58px;   /* 🔥 BIGGER */
  font-weight:900;
  color:#dc2626;
}

/* MOTIVATION */
.bottom-text{
  text-align:center;
  margin-top:25px;
  font-size:15px;   /* 🔥 BIGGER */
  color:#444;
  line-height:1.6;
}

.motto{
  margin-top:10px;
  font-weight:900;
  font-size:18px;   /* 🔥 BIGGER */
  color:#1e4ed8;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <img class="logo"
       src="https://upload.wikimedia.org/wikipedia/commons/5/5b/Kazpost_logo.svg">

  <div class="brand">QAZPOST</div>
  <div class="subtitle">FINTECH EXCHANGE</div>

  <img class="qr"
       src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=https://your-site.com">

  <div class="side-footer">LIVE SYSTEM</div>

</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
  <div></div>
  <div class="time" id="time">--:--</div>
</div>

<!-- 🔥 BIG HEADER -->
<div class="banner">
  QAZPOST – сенімді қаржы серіктесі / надёжный финансовый партнёр
</div>

<!-- 🔥 BIG INFO -->
<div class="info">
  💡 Баға тиімді • Сенімді айырбас / Выгодный курс • Надёжный обмен
</div>

<!-- TABLE -->
<div class="card">

  <div class="row header">
    <div>ВАЛЮТА</div>
    <div style="text-align:center">САТЫП АЛУ</div>
    <div style="text-align:right">САТУ</div>
  </div>

  <div class="row">
    <div class="name">USD</div>
    <div class="buy">464</div>
    <div class="sell">471</div>
  </div>

  <div class="row">
    <div class="name">EUR</div>
    <div class="buy">546</div>
    <div class="sell">556</div>
  </div>

  <div class="row">
    <div class="name">RUB</div>
    <div class="buy">6.0</div>
    <div class="sell">6.3</div>
  </div>

</div>

<!-- MOTIVATION -->
<div class="bottom-text">

  <div class="motto">
    “Болашағыңды бүгіннен басқар” / “Управляй будущим уже сегодня”
  </div>

</div>

</div>

<script>
setInterval(()=>{
  document.getElementById("time").innerText = new Date().toLocaleTimeString();
},1000);
</script>

</body>
</html>
