<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kazpost Live Rate</title>

<style>

/* RESET */
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0a1a3a;
  display:flex;
}

/* LEFT SIDE */
.sidebar{
  width:260px;
  background:#0b1633;
  color:white;
  text-align:center;
  padding:25px;
}

.sidebar img.logo{
  width:120px;
  margin-top:30px;
}

.sidebar .qr{
  margin-top:40px;
  width:140px;
  background:white;
  padding:10px;
  border-radius:12px;
}

.sidebar .text{
  margin-top:20px;
  font-weight:bold;
  letter-spacing:2px;
  font-size:14px;
  opacity:0.8;
}

/* MAIN */
.main{
  flex:1;
  background:#f4f6fb;
  padding:20px 30px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

.header h1{
  font-size:28px;
  color:#1e4ed8;
  margin:0;
}

.time{
  font-size:14px;
  color:#666;
}

/* TABLE WRAPPER */
.card{
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* ROW */
.row{
  display:grid;
  grid-template-columns: 1fr 1fr 1fr;
  padding:22px 25px;
  border-bottom:1px solid #eee;
  align-items:center;
}

/* HEADER ROW */
.row.header{
  background:#0f2a66;
  color:white;
  font-weight:bold;
}

/* CURRENCY NAME */
.name{
  font-size:26px;
  font-weight:800;
  color:#111;
}

/* BUY */
.buy{
  text-align:center;
  font-size:34px;
  font-weight:800;
  color:#16a34a;
}

/* SELL */
.sell{
  text-align:right;
  font-size:34px;
  font-weight:800;
  color:#dc2626;
}

/* ANIMATION */
.flash{
  animation:flash 0.3s ease;
}

@keyframes flash{
  0%{transform:scale(1.1); opacity:0.4;}
  100%{transform:scale(1); opacity:1;}
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/5/5b/Kazpost_logo.svg">

  <div class="text">EXCHANGE RATE SYSTEM</div>

  <img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://your-site.com">

  <div class="text">LIVE DATA</div>

</div>

<!-- MAIN -->
<div class="main">

<div class="header">
  <h1>LIVE VALYUTA</h1>
  <div class="time" id="time">--:--</div>
</div>

<div class="card">

  <div class="row header">
    <div>ВАЛЮТА</div>
    <div style="text-align:center">САТЫП АЛУ</div>
    <div style="text-align:right">САТУ</div>
  </div>

  <div class="row">
    <div class="name">USD</div>
    <div class="buy" id="usdBuy">-</div>
    <div class="sell" id="usdSell">-</div>
  </div>

  <div class="row">
    <div class="name">EUR</div>
    <div class="buy" id="eurBuy">-</div>
    <div class="sell" id="eurSell">-</div>
  </div>

  <div class="row">
    <div class="name">RUB</div>
    <div class="buy" id="rubBuy">-</div>
    <div class="sell" id="rubSell">-</div>
  </div>

</div>

</div>

<script>
setInterval(()=>{
  const now = new Date();
  document.getElementById("time").innerText = now.toLocaleTimeString();
},1000);
</script>

</body>
</html>
