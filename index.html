<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LIVE Валюта</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
}

.box {
  margin: 10px auto;
  padding: 20px;
  background: #f2f2f2;
  border-radius: 10px;
  max-width: 300px;
}

/* Admin */
.admin {
  margin-top: 30px;
  padding: 20px;
  background: #111;
  color: white;
  border-radius: 10px;
  max-width: 300px;
  margin-left: auto;
  margin-right: auto;
}

input {
  width: 90%;
  padding: 8px;
  margin: 5px;
}

button {
  padding: 10px;
  width: 95%;
  margin-top: 10px;
  cursor: pointer;
}

/* TV */
@media (min-width: 1600px) {
  h1 {
    font-size: 48px;
  }
  .box {
    font-size: 26px;
    max-width: 400px;
  }
}

/* Phone */
@media (max-width: 768px) {
  h1 {
    font-size: 24px;
  }
  .box {
    font-size: 16px;
  }
}
</style>

</head>

<body>

<h1>💱 LIVE Валюта</h1>

<div class="box">USD → 1000 ₸</div>
<div class="box">EUR → 1000 ₸</div>
<div class="box">RUB → 5000 ₸</div>

<div class="admin">
  <h3>Admin Panel</h3>

  <input placeholder="USD">
  <input placeholder="EUR">
  <input placeholder="RUB">

  <button>Save</button>
</div>

</body>
</html>
