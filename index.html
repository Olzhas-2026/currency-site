<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  doc,
  onSnapshot,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCxY06NTpnfifUOzPNUsQWMx2P_GKSagI",
  authDomain: "currency-live-d633e.firebaseapp.com",
  projectId: "currency-live-d633e",
  storageBucket: "currency-live-d633e.firebasestorage.app",
  messagingSenderId: "1086647236449",
  appId: "1:1086647236449:web:df6eee1cdec5280ee1b720"
};

// INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const ref = doc(db, "rates", "Vt6Ibuny1gDsyRJfCKLx");

// 🔥 LIVE UPDATE
onSnapshot(ref, (snap) => {
  if (!snap.exists()) return;

  const data = snap.data();

  document.getElementById("usd").innerText = "USD → " + data.usd + " ₸";
  document.getElementById("eur").innerText = "EUR → " + data.eur + " ₸";
  document.getElementById("rub").innerText = "RUB → " + data.rub + " ₸";
});

// 🔐 LOGIN
window.login = async function () {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  try {
    await signInWithEmailAndPassword(auth, email, pass);
    document.getElementById("adminPanel").style.display = "block";
    alert("✅ Login successful");
  } catch (e) {
    alert("❌ Wrong email or password");
  }
};

// AUTO LOGIN CHECK
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("adminPanel").style.display = "block";
  }
});

// 🔄 UPDATE DATA
window.updateRates = async function () {
  await updateDoc(ref, {
    usd: Number(document.getElementById("usdInput").value),
    eur: Number(document.getElementById("eurInput").value),
    rub: Number(document.getElementById("rubInput").value)
  });

  document.getElementById("status").innerText = "✅ Updated!";
};

</script>
