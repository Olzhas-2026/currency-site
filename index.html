<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LIVE Валюта</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
}

.box {
  margin: 10px auto;
  padding: 20px;
  background: #f2f2f2;
  border-radius: 10px;
  max-width: 300px;
  font-size: 20px;
}

/* TV */
@media (min-width: 1600px) {
  .box {
    font-size: 26px;
    max-width: 400px;
  }
}

/* Phone */
@media (max-width: 768px) {
  .box {
    font-size: 16px;
  }
}
</style>

</head>

<body>

<h1>💱 LIVE Валюта</h1>

<div class="box" id="usd">USD...</div>
<div class="box" id="eur">EUR...</div>
<div class="box" id="rub">RUB...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "currency-live-d633e.firebaseapp.com",
  projectId: "currency-live-d633e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ref = doc(db, "rates", "Vt6Ibuny1gDsyRJfCKLx");

onSnapshot(ref, (snap) => {
  if (snap.exists()) {
    const data = snap.data();

    document.getElementById("usd").innerText = "USD → " + data.usd + " ₸";
    document.getElementById("eur").innerText = "EUR → " + data.eur + " ₸";
    document.getElementById("rub").innerText = "RUB → " + data.rub + " ₸";
  }
});
</script>

</body>
</html>
