<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kazpost Terminal</title>

<style>

/* 🌑 TERMINAL BACKGROUND */
body{
  margin:0;
  background:#050b1a;
  font-family: "Courier New", monospace;
  color:#00ffcc;
  display:flex;
  height:100vh;
}

/* LEFT PANEL (SYSTEM INFO) */
.left{
  width:300px;
  background:#07142e;
  padding:25px;
  border-right:2px solid #0ff;
}

.logo{
  width:140px;
  filter:drop-shadow(0 0 10px #0ff);
}

.title{
  margin-top:20px;
  font-size:14px;
  letter-spacing:2px;
  color:#0ff;
}

.status{
  margin-top:20px;
  font-size:12px;
  opacity:0.8;
}

.box{
  margin-top:30px;
  padding:10px;
  border:1px solid #0ff;
  border-radius:6px;
  font-size:12px;
}

/* RIGHT MAIN */
.main{
  flex:1;
  padding:25px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #0ff;
  padding-bottom:10px;
}

.header h1{
  font-size:22px;
  color:#0ff;
  letter-spacing:2px;
}

.time{
  color:#0ff;
  font-size:14px;
}

/* TABLE */
.table{
  margin-top:20px;
  border:1px solid #0ff;
  border-radius:8px;
  overflow:hidden;
}

/* ROW */
.row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  padding:18px;
  border-bottom:1px solid rgba(0,255,204,0.2);
}

/* HEADER ROW */
.row.head{
  background:rgba(0,255,204,0.1);
  font-weight:bold;
}

/* TEXT */
.name{
  font-size:20px;
  color:#0ff;
}

.buy{
  text-align:center;
  font-size:24px;
  color:#00ff66;
}

.sell{
  text-align:right;
  font-size:24px;
  color:#ff3355;
}

/* GLOW EFFECT */
.glow{
  text-shadow:0 0 8px #0ff;
}

</style>
</head>

<body>

<!-- LEFT SYSTEM PANEL -->
<div class="left">

  <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/5/5b/Kazpost_logo.svg">

  <div class="title">KAZPOST TERMINAL SYSTEM</div>

  <div class="status">STATUS: ONLINE 🟢</div>

  <div class="box">
    SYSTEM: FINTECH v3.0<br>
    MODE: LIVE TRADING<br>
    SECURITY: ACTIVE
  </div>

  <div class="box">
    CONNECTION: FIREBASE<br>
    LATENCY: 12ms<br>
    SYNC: REAL-TIME
  </div>

</div>

<!-- MAIN -->
<div class="main">

  <div class="header">
    <h1 class="glow">LIVE CURRENCY TERMINAL</h1>
    <div class="time" id="time">--:--</div>
  </div>

  <div class="table">

    <div class="row head">
      <div>ASSET</div>
      <div style="text-align:center">BUY</div>
      <div style="text-align:right">SELL</div>
    </div>

    <div class="row">
      <div class="name">USD</div>
      <div class="buy">464</div>
      <div class="sell">471</div>
    </div>

    <div class="row">
      <div class="name">EUR</div>
      <div class="buy">546</div>
      <div class="sell">556</div>
    </div>

    <div class="row">
      <div class="name">RUB</div>
      <div class="buy">6.0</div>
      <div class="sell">6.3</div>
    </div>

  </div>

</div>

<script>
setInterval(()=>{
  document.getElementById("time").innerText = new Date().toLocaleTimeString();
},1000);
</script>

</body>
</html>
