<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kazpost Live</title>

<style>

/* GLOBAL */
body{
  margin:0;
  font-family: Arial, sans-serif;
  display:flex;
  background:#0b1633;
}

/* LEFT PANEL */
.sidebar{
  width:270px;
  background:#08122b;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:30px 20px;
  color:white;
}

.sidebar img.logo{
  width:130px;
  margin-top:40px;
}

.sidebar .title{
  margin-top:20px;
  font-size:16px;
  font-weight:700;
  letter-spacing:2px;
  opacity:0.85;
}

.sidebar .qr{
  margin-top:50px;
  width:150px;
  background:white;
  padding:10px;
  border-radius:12px;
}

.sidebar .bottom{
  margin-top:auto;
  font-size:12px;
  opacity:0.5;
  letter-spacing:2px;
}

/* MAIN */
.main{
  flex:1;
  background:#f4f6fb;
  padding:25px 35px;
}

/* TOP HEADER */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.topbar h1{
  margin:0;
  font-size:30px;
  font-weight:800;
  color:#1e4ed8;
}

.time{
  font-size:14px;
  color:#666;
}

/* CARD */
.card{
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 12px 30px rgba(0,0,0,0.08);
}

/* HEADER ROW */
.row.header{
  background:#0f2a66;
  color:white;
  font-weight:700;
  font-size:14px;
  padding:18px 25px;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
}

/* ROW */
.row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  padding:28px 25px;
  border-bottom:1px solid #eee;
  align-items:center;
}

/* CURRENCY */
.name{
  font-size:30px;
  font-weight:800;
  color:#111;
}

/* BUY */
.buy{
  text-align:center;
  font-size:40px;
  font-weight:800;
  color:#16a34a;
}

/* SELL */
.sell{
  text-align:right;
  font-size:40px;
  font-weight:800;
  color:#dc2626;
}

/* ANIMATION */
.flash{
  animation:flash 0.25s ease;
}

@keyframes flash{
  0%{transform:scale(1.08); opacity:0.4;}
  100%{transform:scale(1); opacity:1;}
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/5/5b/Kazpost_logo.svg">

  <div class="title">EXCHANGE SYSTEM</div>

  <img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://your-site.com">

  <div class="bottom">LIVE DATA</div>

</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
  <h1>LIVE VALYUTA</h1>
  <div class="time" id="time">--:--</div>
</div>

<div class="card">

  <div class="row header">
    <div>ВАЛЮТА</div>
    <div style="text-align:center">САТЫП АЛУ</div>
    <div style="text-align:right">САТУ</div>
  </div>

  <div class="row">
    <div class="name">USD</div>
    <div class="buy" id="usdBuy">-</div>
    <div class="sell" id="usdSell">-</div>
  </div>

  <div class="row">
    <div class="name">EUR</div>
    <div class="buy" id="eurBuy">-</div>
    <div class="sell" id="eurSell">-</div>
  </div>

  <div class="row">
    <div class="name">RUB</div>
    <div class="buy" id="rubBuy">-</div>
    <div class="sell" id="rubSell">-</div>
  </div>

</div>

</div>

<script>
setInterval(()=>{
  document.getElementById("time").innerText = new Date().toLocaleTimeString();
},1000);
</script>

</body>
</html>
