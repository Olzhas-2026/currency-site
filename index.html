<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>QAZPOST</title>

<style>
body{margin:0;font-family:Arial;background:#0b1633;display:flex}

/* SIDEBAR */
.sidebar{
  width:280px;
  background:#071a3a;
  color:white;
  text-align:center;
  padding:20px;
}

.logo{
  width:180px;
  background:white;
  padding:10px;
  border-radius:12px;
}

.brand{color:#00d4ff;font-weight:bold;margin-top:10px}

/* MAIN */
.main{
  flex:1;
  background:#f4f6fb;
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:15px;
  border-bottom:1px solid #eee;
}

.buy{color:green;font-weight:bold}
.sell{color:red;font-weight:bold}

/* ADMIN */
#admin{
  display:none;
  position:fixed;
  top:10px;
  right:10px;
  background:#1e4ed8;
  color:white;
  padding:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("auth")!=="admin"){
  window.location.href="login.html";
}
</script>

<div id="admin">
  ADMIN MODE
  <button onclick="logout()">Logout</button>
</div>

<div class="sidebar">
  <img class="logo" src="kazpost.png">
  <div class="brand">QAZPOST</div>
</div>

<div class="main">

<h2>Exchange Rates</h2>

<div class="card">

  <div class="row">
    <div>USD</div>
    <div class="buy" id="usdBuy">464</div>
    <div class="sell" id="usdSell">471</div>
  </div>

  <div class="row">
    <div>EUR</div>
    <div class="buy" id="eurBuy">546</div>
    <div class="sell" id="eurSell">556</div>
  </div>

  <div class="row">
    <div>RUB</div>
    <div class="buy" id="rubBuy">6.0</div>
    <div class="sell" id="rubSell">6.3</div>
  </div>

</div>

</div>

<script>

if(localStorage.getItem("auth")==="admin"){
  admin.style.display="block";
}

/* LOAD DATA */
usdBuy.innerText = localStorage.getItem("usdBuy")||"464";
usdSell.innerText = localStorage.getItem("usdSell")||"471";

eurBuy.innerText = localStorage.getItem("eurBuy")||"546";
eurSell.innerText = localStorage.getItem("eurSell")||"556";

rubBuy.innerText = localStorage.getItem("rubBuy")||"6.0";
rubSell.innerText = localStorage.getItem("rubSell")||"6.3";

/* logout */
function logout(){
  localStorage.removeItem("auth");
  location.href="login.html";
}

</script>

</body>
</html>
