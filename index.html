<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVE VALYUTA</title>

<style>

body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0a1a3a;
  display:flex;
}

/* LEFT PANEL */
.sidebar{
  width:220px;
  background:#08122b;
  color:white;
  text-align:center;
  padding:20px;
}

.logo{
  width:80px;
  margin:20px auto;
}

.qr{
  margin-top:40px;
  width:120px;
}

/* MAIN */
.main{
  flex:1;
  background:#f3f5f8;
  padding:20px 30px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.title{
  font-size:32px;
  font-weight:bold;
  color:#2d5bd1;
}

.time{
  font-size:14px;
  color:gray;
}

/* TABLE */
.table{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.row{
  display:grid;
  grid-template-columns: 1fr 1fr 1fr;
  padding:25px;
  border-bottom:1px solid #eee;
  align-items:center;
}

.row.header{
  background:#1e3a8a;
  color:white;
  font-weight:bold;
  font-size:16px;
}

.name{
  font-size:32px;
  font-weight:800;
  color:#111;
}

.buy{
  text-align:center;
  font-size:38px;
  font-weight:800;
  color:#16a34a;
}

.sell{
  text-align:right;
  font-size:38px;
  font-weight:800;
  color:#dc2626;
}

.flash{
  animation:flashAnim 0.3s ease;
}

@keyframes flashAnim{
  0%{opacity:0.3; transform:scale(1.1);}
  100%{opacity:1; transform:scale(1);}
}

</style>
</head>

<body>

<div class="sidebar">
  <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/5/5b/Kazpost_logo.svg">
  <img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://your-site.com">
</div>

<div class="main">

<div class="header">
  <div class="title">LIVE VALYUTA</div>
  <div class="time" id="time">--:--</div>
</div>

<!-- TABLE -->
<div class="table">

  <div class="row header">
    <div>ВАЛЮТА</div>
    <div style="text-align:center">САТЫП АЛУ</div>
    <div style="text-align:right">САТУ</div>
  </div>

  <div class="row">
    <div class="name">USD</div>
    <div class="buy" id="usdBuy">-</div>
    <div class="sell" id="usdSell">-</div>
  </div>

  <div class="row">
    <div class="name">EUR</div>
    <div class="buy" id="eurBuy">-</div>
    <div class="sell" id="eurSell">-</div>
  </div>

  <div class="row">
    <div class="name">RUB</div>
    <div class="buy" id="rubBuy">-</div>
    <div class="sell" id="rubSell">-</div>
  </div>

</div>

</div>

<script>
/* TIME */
setInterval(()=>{
  const now = new Date();
  time.innerText = now.toLocaleTimeString();
},1000);
</script>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "currency-live-d633e.firebaseapp.com",
  projectId: "currency-live-d633e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ref = doc(db,"rates","Vt6Ibuny1gDsyRJfCKLx");

/* ANIMATION */
function animate(el,val){
  el.classList.add("flash");
  el.innerText = val;
  setTimeout(()=>el.classList.remove("flash"),300);
}

/* LIVE */
onSnapshot(ref,(snap)=>{
  const d = snap.data();

  animate(usdBuy,d.usdBuy);
  animate(usdSell,d.usdSell);

  animate(eurBuy,d.eurBuy);
  animate(eurSell,d.eurSell);

  animate(rubBuy,d.rubBuy);
  animate(rubSell,d.rubSell);
});

</script>

</body>
</html>
