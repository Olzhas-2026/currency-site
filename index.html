<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kazpost LIVE Valyuta</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f9;
  text-align: center;
  padding: 20px;
}

h1 {
  color: #0057b8;
}

/* Kazpost card */
.card {
  background: white;
  margin: 12px auto;
  padding: 18px;
  max-width: 320px;
  border-radius: 10px;
  border-left: 5px solid #0057b8;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.title {
  font-size: 22px;
  font-weight: bold;
  color: #0057b8;
}

.row {
  margin: 5px 0;
  font-size: 16px;
}

.sell {
  color: red;
  font-weight: bold;
}

/* admin */
#admin {
  display:none;
  margin-top:20px;
  padding:15px;
  background:#111;
  color:white;
  max-width:320px;
  margin:auto;
  border-radius:10px;
}

input, button {
  width:90%;
  padding:8px;
  margin:5px;
}
</style>
</head>

<body>

<h1>💱 Kazpost LIVE Валюта</h1>

<!-- VIEW -->
<div class="card">
  <div class="title">USD</div>
  <div class="row">Buy: <span id="usdBuy">...</span> ₸</div>
  <div class="row sell">Sell: <span id="usdSell">...</span> ₸</div>
</div>

<div class="card">
  <div class="title">EUR</div>
  <div class="row">Buy: <span id="eurBuy">...</span> ₸</div>
  <div class="row sell">Sell: <span id="eurSell">...</span> ₸</div>
</div>

<div class="card">
  <div class="title">RUB</div>
  <div class="row">Buy: <span id="rubBuy">...</span> ₸</div>
  <div class="row sell">Sell: <span id="rubSell">...</span> ₸</div>
</div>

<hr>

<!-- LOGIN -->
<input type="password" id="pass" placeholder="Admin password">
<button onclick="login()">Login</button>

<!-- ADMIN -->
<div id="admin">

  <h3>Admin Panel</h3>

  <input id="usdBuyInput" placeholder="USD BUY">
  <input id="usdSellInput" placeholder="USD SELL">

  <input id="eurBuyInput" placeholder="EUR BUY">
  <input id="eurSellInput" placeholder="EUR SELL">

  <input id="rubBuyInput" placeholder="RUB BUY">
  <input id="rubSellInput" placeholder="RUB SELL">

  <button onclick="save()">Save</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  doc,
  onSnapshot,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "currency-live-d633e.firebaseapp.com",
  projectId: "currency-live-d633e",
  storageBucket: "currency-live-d633e.firebasestorage.app",
  messagingSenderId: "1086647236449",
  appId: "1:1086647236449:web:df6eee1cdec5280ee1b720"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ref = doc(db, "rates", "Vt6Ibuny1gDsyRJfCKLx");

/* LIVE */
onSnapshot(ref, (snap) => {
  const d = snap.data();

  document.getElementById("usdBuy").innerText = d.usdBuy;
  document.getElementById("usdSell").innerText = d.usdSell;

  document.getElementById("eurBuy").innerText = d.eurBuy;
  document.getElementById("eurSell").innerText = d.eurSell;

  document.getElementById("rubBuy").innerText = d.rubBuy;
  document.getElementById("rubSell").innerText = d.rubSell;
});

/* LOGIN */
window.login = function () {
  if (document.getElementById("pass").value === "1234") {
    document.getElementById("admin").style.display = "block";
  } else {
    alert("Wrong password");
  }
};

/* SAVE */
window.save = async function () {
  await updateDoc(ref, {
    usdBuy: Number(document.getElementById("usdBuyInput").value),
    usdSell: Number(document.getElementById("usdSellInput").value),

    eurBuy: Number(document.getElementById("eurBuyInput").value),
    eurSell: Number(document.getElementById("eurSellInput").value),

    rubBuy: Number(document.getElementById("rubBuyInput").value),
    rubSell: Number(document.getElementById("rubSellInput").value),
  });

  alert("Saved!");
};

</script>

</body>
</html>
