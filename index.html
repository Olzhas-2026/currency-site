<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Валюта LIVE</title>
  <style>
    body { font-family: Arial; text-align:center; padding:50px; }
    .box { margin:10px auto; padding:20px; width:250px; background:#f2f2f2; border-radius:10px; }
  </style>
</head>
<body>

<h1>💱 LIVE Валюта</h1>

<div class="box" id="usd">USD жүктелуде...</div>
<div class="box" id="eur">EUR жүктелуде...</div>
<div class="box" id="rub">RUB жүктелуде...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCxY06NTpnfifUOzPNUsQWMx2pG_PKSagI",
  authDomain: "currency-live-d633e.firebaseapp.com",
  projectId: "currency-live-d633e",
  storageBucket: "currency-live-d633e.firebasestorage.app",
  messagingSenderId: "1086647236449",
  appId: "1:1086647236449:web:df6eee1cdec5280ee1b720"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Firestore document
const ref = doc(db, "rates", "Vt6Ibuny1gDsyRJfCKLx");

// REAL-TIME LISTENER
onSnapshot(ref, (snap) => {
  if (snap.exists()) {
    const data = snap.data();

    document.getElementById("usd").innerText = "USD → " + data.usd + " ₸";
    document.getElementById("eur").innerText = "EUR → " + data.eur + " ₸";
    document.getElementById("rub").innerText = "RUB → " + data.rub + " ₸";
  }
});

</script>

</body>
</html>
