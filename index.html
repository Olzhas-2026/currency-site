<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>QAZPOST Exchange</title>

<style>
body{
  margin:0;
  font-family:Arial;
  display:flex;
  background:#0b1633;
  color:white;
}

.sidebar{
  width:260px;
  background:#06122a;
  padding:20px;
  text-align:center;
}

.logo{
  width:160px;
  background:white;
  padding:10px;
  border-radius:12px;
}

.main{
  flex:1;
  padding:20px;
}

.card{
  background:white;
  color:black;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:10px;
  font-size:22px;
}

.buy{color:green;font-weight:bold}
.sell{color:red;font-weight:bold}

/* admin */
#admin{
  display:none;
  position:fixed;
  top:10px;
  right:10px;
  background:#1e4ed8;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN CHECK -->
<script>
if(localStorage.getItem("auth") !== "admin"){
  window.location.href = "login.html";
}
</script>

<!-- ADMIN -->
<div id="admin">
  ADMIN MODE
  <button onclick="logout()">Logout</button>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <img class="logo" src="kazpost.png">
  <h2>QAZPOST</h2>
</div>

<!-- MAIN -->
<div class="main">

<h1>Exchange Rates</h1>

<div class="card">

  <div class="row">
    <b>USD</b>
    <span class="buy" id="usdBuy">464</span>
    <span class="sell" id="usdSell">471</span>
  </div>

  <div class="row">
    <b>EUR</b>
    <span class="buy" id="eurBuy">546</span>
    <span class="sell" id="eurSell">556</span>
  </div>

  <div class="row">
    <b>RUB</b>
    <span class="buy" id="rubBuy">6.0</span>
    <span class="sell" id="rubSell">6.3</span>
  </div>

</div>

</div>

<script>

/* admin show */
if(localStorage.getItem("auth")==="admin"){
  document.getElementById("admin").style.display="block";
}

/* LOAD */
function loadRates(){

  usdBuy.innerText = localStorage.getItem("usdBuy") || "464";
  usdSell.innerText = localStorage.getItem("usdSell") || "471";

  eurBuy.innerText = localStorage.getItem("eurBuy") || "546";
  eurSell.innerText = localStorage.getItem("eurSell") || "556";

  rubBuy.innerText = localStorage.getItem("rubBuy") || "6.0";
  rubSell.innerText = localStorage.getItem("rubSell") || "6.3";
}

loadRates();
setInterval(loadRates,2000);

/* logout */
function logout(){
  localStorage.removeItem("auth");
  window.location.href="login.html";
}

</script>

</body>
</html>
