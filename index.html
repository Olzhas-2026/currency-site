<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QAZPOST Exchange System</title>

<style>

html, body{
  height:100%;
  margin:0;
  font-family: system-ui, Arial;
  background:#0b1633;
}

/* LAYOUT */
body{
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:280px;
  background:linear-gradient(180deg,#06122a,#071a3a);
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:30px 20px;
}

/* LOGO */
.logo{
  width:200px;
  background:white;
  padding:12px;
  border-radius:16px;
  box-shadow:0 15px 35px rgba(0,0,0,0.35);
}

/* BRAND */
.brand{
  margin-top:15px;
  font-size:24px;
  font-weight:900;
  color:#00d4ff;
}

.subtitle{
  font-size:11px;
  opacity:0.6;
  text-align:center;
}

/* MAIN */
.main{
  flex:1;
  background:#f4f6fb;
  padding:25px;
}

.banner{
  background:linear-gradient(90deg,#0f2a66,#1e4ed8);
  color:white;
  padding:28px;
  border-radius:14px;
  text-align:center;
  font-size:30px;
  font-weight:900;
}

/* CARD */
.card{
  margin-top:20px;
  background:white;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 20px 45px rgba(0,0,0,0.12);
}

/* ROW */
.row{
  display:flex;
  justify-content:space-between;
  padding:25px;
  border-bottom:1px solid #eee;
}

.name{
  font-size:28px;
  font-weight:900;
}

.buy{
  color:green;
  font-size:28px;
  font-weight:900;
}

.sell{
  color:red;
  font-size:28px;
  font-weight:900;
}

/* ADMIN PANEL BUTTON */
#admin{
  display:none;
  position:fixed;
  top:10px;
  right:10px;
  background:#1e4ed8;
  color:white;
  padding:10px;
  border-radius:10px;
}

</style>
</head>

<body>

<!-- 🔐 LOGIN CHECK -->
<script>
if(localStorage.getItem("auth") !== "admin"){
  window.location.href="login.html";
}
</script>

<!-- ADMIN -->
<div id="admin">
  ADMIN MODE
  <button onclick="logout()">Logout</button>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <img class="logo" src="kazpost.png">
  <div class="brand">QAZPOST</div>
  <div class="subtitle">FINTECH SYSTEM</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="banner">
  QAZPOST – Exchange System
</div>

<div class="card">

  <div class="row">
    <div class="name">USD</div>
    <div class="buy" id="usdBuy">464</div>
    <div class="sell" id="usdSell">471</div>
  </div>

  <div class="row">
    <div class="name">EUR</div>
    <div class="buy" id="eurBuy">546</div>
    <div class="sell" id="eurSell">556</div>
  </div>

  <div class="row">
    <div class="name">RUB</div>
    <div class="buy" id="rubBuy">6.0</div>
    <div class="sell" id="rubSell">6.3</div>
  </div>

</div>

</div>

<script>

/* show admin */
if(localStorage.getItem("auth")==="admin"){
  document.getElementById("admin").style.display="block";
}

/* 🔥 LOAD RATES (IMPORTANT) */
function loadRates(){

  usdBuy.innerText = localStorage.getItem("usdBuy") || "464";
  usdSell.innerText = localStorage.getItem("usdSell") || "471";

  eurBuy.innerText = localStorage.getItem("eurBuy") || "546";
  eurSell.innerText = localStorage.getItem("eurSell") || "556";

  rubBuy.innerText = localStorage.getItem("rubBuy") || "6.0";
  rubSell.innerText = localStorage.getItem("rubSell") || "6.3";
}

loadRates();

/* LIVE UPDATE */
setInterval(loadRates, 2000);

/* logout */
function logout(){
  localStorage.removeItem("auth");
  window.location.href="login.html";
}

</script>

</body>
</html>
