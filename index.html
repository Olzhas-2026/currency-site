<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QAZPOST Exchange</title>

<!-- 🔥 BEST FONT FOR UNIFORM NUMBERS + KAZAKH -->
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&family=Noto+Sans+Display:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>

html, body{
  height:100%;
  margin:0;
  background:#0b1633;
  font-family:'Noto Sans Display', sans-serif;
}

/* LAYOUT */
body{
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:280px;
  background:linear-gradient(180deg,#06122a,#071a3a);
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:30px 20px;
}

.logo{
  width:150px;
  margin-top:25px;
}

.brand{
  margin-top:15px;
  font-size:22px;
  font-weight:900;
  color:#00d4ff;
}

.subtitle{
  font-size:11px;
  opacity:0.6;
  text-align:center;
}

/* MAIN */
.main{
  flex:1;
  background:#f4f6fb;
  padding:25px 35px;
}

/* HEADER */
.banner{
  background:linear-gradient(90deg,#0f2a66,#1e4ed8);
  color:white;
  padding:26px;
  border-radius:14px;
  text-align:center;
  font-size:30px;
  font-weight:900;
  margin-bottom:10px;
}

/* INFO */
.info{
  text-align:center;
  font-size:18px;
  font-weight:800;
  color:#1e4ed8;
  margin-bottom:25px;
}

/* TABLE */
.card{
  background:white;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 20px 45px rgba(0,0,0,0.12);
  max-width:900px;
  margin:auto;
}

/* HEADER ROW */
.row.header{
  background:#0f2a66;
  color:white;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  padding:18px 25px;
  font-size:14px;
  font-weight:800;
}

/* ROW */
.row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  padding:30px 25px;
  border-bottom:1px solid #eee;
  align-items:center;
}

/* 🔥 UNIFORM TEXT FIX */
.name{
  font-size:40px;
  font-weight:900;
  letter-spacing:1px;
}

/* 🔥 FIXED NUMBERS ALIGNMENT */
.buy, .sell{
  font-family:'Roboto Mono', monospace; /* 🔥 IMPORTANT FIX */
  font-size:52px;
  font-weight:700;
  letter-spacing:0px;
}

/* COLORS */
.buy{
  text-align:center;
  color:#16a34a;
}

.sell{
  text-align:right;
  color:#dc2626;
}

/* SLOGAN */
.slogan-box{
  margin-top:25px;
  text-align:center;
}

.slogan{
  font-size:20px;
  font-weight:900;
  color:#0f2a66;
  line-height:1.6;
}

.slogan span{
  display:block;
  font-size:18px;
  font-weight:700;
  color:#1e4ed8;
  margin-top:6px;
}

</style>
</head>

<body>

<div class="sidebar">

  <img class="logo"
       src="https://upload.wikimedia.org/wikipedia/commons/5/5b/Kazpost_logo.svg">

  <div class="brand">QAZPOST</div>
  <div class="subtitle">FINTECH SYSTEM</div>

</div>

<div class="main">

<div class="banner">
  QAZPOST – сенімді қаржы серіктесі / надёжный финансовый партнёр
</div>

<div class="info">
  💡 Баға тиімді • Сенімді айырбас / Выгодный курс • Надёжный обмен
</div>

<div class="card">

  <div class="row header">
    <div>ВАЛЮТА</div>
    <div style="text-align:center">САТЫП АЛУ</div>
    <div style="text-align:right">САТУ</div>
  </div>

  <div class="row">
    <div class="name">USD</div>
    <div class="buy">464</div>
    <div class="sell">471</div>
  </div>

  <div class="row">
    <div class="name">EUR</div>
    <div class="buy">546</div>
    <div class="sell">556</div>
  </div>

  <div class="row">
    <div class="name">RUB</div>
    <div class="buy">6.0</div>
    <div class="sell">6.3</div>
  </div>

</div>

<div class="slogan-box">
  <div class="slogan">
    “Болашағыңды бүгіннен басқар”
    <span>/ Управляй будущим уже сегодня</span>
  </div>
</div>

</div>

</body>
</html>
