<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QAZPOST Exchange System</title>

<style>

html, body{
  height:100%;
  margin:0;
  font-family: system-ui, Arial;
  background:linear-gradient(135deg,#0b1633,#0a2a6b);
  display:flex;
  color:white;
}

/* SIDEBAR */
.sidebar{
  width:280px;
  background:rgba(0,0,0,0.25);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:25px;
  border-right:1px solid rgba(255,255,255,0.1);
}

.logo{
  width:180px;
  background:white;
  padding:10px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.brand{
  margin-top:10px;
  font-size:22px;
  font-weight:900;
  color:#00e5ff;
}

.subtitle{
  font-size:11px;
  opacity:0.7;
}

/* MAIN */
.main{
  flex:1;
  padding:30px;
}

.banner{
  background:linear-gradient(90deg,#1e4ed8,#00c6ff);
  padding:25px;
  border-radius:20px;
  text-align:center;
  font-size:26px;
  font-weight:900;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* CARD */
.card{
  margin-top:20px;
  background:rgba(255,255,255,0.08);
  border-radius:20px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.1);
}

/* ROW */
.row{
  display:flex;
  justify-content:space-between;
  padding:20px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.name{
  font-size:26px;
  font-weight:900;
}

.buy{color:#00ff99;font-size:26px;font-weight:900}

.sell{color:#ff4d4d;font-size:26px;font-weight:900}

/* ADMIN PANEL */
#admin{
  display:none;
  position:fixed;
  top:10px;
  right:10px;
  background:#1e4ed8;
  padding:10px;
  border-radius:10px;
}

</style>
</head>

<body>

<!-- 🔐 LOGIN CHECK -->
<script>
if(localStorage.getItem("auth") !== "admin"){
  window.location.href="login.html";
}
</script>

<!-- ADMIN BUTTON -->
<div id="admin">
  ADMIN MODE
  <button onclick="logout()">Logout</button>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <img class="logo" src="kazpost.png">
  <div class="brand">QAZPOST</div>
  <div class="subtitle">FINTECH SYSTEM</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="banner">
  QAZPOST – Exchange System
</div>

<div class="card">

  <div class="row">
    <div class="name">USD</div>
    <div class="buy" id="usdBuy">464</div>
    <div class="sell" id="usdSell">471</div>
  </div>

  <div class="row">
    <div class="name">EUR</div>
    <div class="buy" id="eurBuy">546</div>
    <div class="sell" id="eurSell">556</div>
  </div>

  <div class="row">
    <div class="name">RUB</div>
    <div class="buy" id="rubBuy">6.0</div>
    <div class="sell" id="rubSell">6.3</div>
  </div>

</div>

</div>

<!-- 🔥 SCRIPT -->
<script>

/* admin show */
if(localStorage.getItem("auth")==="admin"){
  document.getElementById("admin").style.display="block";
}

/* LOAD RATES */
function loadRates(){

  document.getElementById("usdBuy").innerText = localStorage.getItem("usdBuy") || "464";
  document.getElementById("usdSell").innerText = localStorage.getItem("usdSell") || "471";

  document.getElementById("eurBuy").innerText = localStorage.getItem("eurBuy") || "546";
  document.getElementById("eurSell").innerText = localStorage.getItem("eurSell") || "556";

  document.getElementById("rubBuy").innerText = localStorage.getItem("rubBuy") || "6.0";
  document.getElementById("rubSell").innerText = localStorage.getItem("rubSell") || "6.3";
}

loadRates();

/* LIVE UPDATE */
setInterval(loadRates, 2000);

/* logout */
function logout(){
  localStorage.removeItem("auth");
  window.location.href="login.html";
}

</script>

</body>
</html>
