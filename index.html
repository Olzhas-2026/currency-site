<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QAZPOST Exchange System</title>

<style>
html, body{
  height:100%;
  margin:0;
  font-family: system-ui, Arial;
  background:#0b1633;
}

body{ display:flex; }

.sidebar{
  width:280px;
  background:linear-gradient(180deg,#06122a,#071a3a);
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:30px 20px;
}

.logo{
  width:200px;
  background:white;
  padding:12px;
  border-radius:16px;
  box-shadow:0 15px 35px rgba(0,0,0,0.35);
}

.brand{
  margin-top:15px;
  font-size:24px;
  font-weight:900;
  color:#00d4ff;
}

.subtitle{ font-size:11px; opacity:0.6; text-align:center; }

.qr{
  margin-top:40px;
  width:140px;
  background:white;
  padding:10px;
  border-radius:10px;
}

.main{
  flex:1;
  background:#f4f6fb;
  padding:25px;
}

.banner{
  background:#1e4ed8;
  color:white;
  padding:25px;
  border-radius:14px;
  text-align:center;
  font-size:28px;
  font-weight:900;
}

/* ADMIN PANEL */
#adminPanel{
  display:none;
  position:fixed;
  top:10px;
  right:10px;
  background:#1e4ed8;
  color:white;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<script>
if(localStorage.getItem("auth") !== "admin"){
  window.location.href="login.html";
}
</script>

<div id="adminPanel">
  🔐 ADMIN
  <button onclick="logout()">Logout</button>
</div>

<div class="sidebar">
  <img class="logo" src="kazpost.png">
  <div class="brand">QAZPOST</div>
  <div class="subtitle">FINTECH SYSTEM</div>
</div>

<div class="main">
  <div class="banner">
    QAZPOST – Exchange System
  </div>
</div>

<script>
if(localStorage.getItem("auth") === "admin"){
  document.getElementById("adminPanel").style.display = "block";
}

function logout(){
  localStorage.removeItem("auth");
  window.location.href="login.html";
}
</script>

</body>
</html>
