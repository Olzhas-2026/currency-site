<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRO MAX FINTECH</title>

<style>

body{
  margin:0;
  font-family: Arial, sans-serif;
  display:flex;
  background:#0b1633;
}

/* SIDEBAR */
.sidebar{
  width:280px;
  background:#08122b;
  color:white;
  text-align:center;
  padding:30px 20px;
}

.logo{
  width:140px;
  margin-top:40px;
}

.brand{
  margin-top:15px;
  font-size:14px;
  letter-spacing:2px;
  opacity:0.8;
  font-weight:700;
}

.qr{
  margin-top:50px;
  width:150px;
  background:white;
  padding:10px;
  border-radius:12px;
}

.bottom{
  margin-top:auto;
  font-size:11px;
  opacity:0.5;
}

/* MAIN */
.main{
  flex:1;
  background:#f4f6fb;
  padding:25px 35px;
}

/* HEADER */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

h1{
  margin:0;
  font-size:32px;
  color:#1e4ed8;
  font-weight:900;
}

.time{
  font-size:14px;
  color:#666;
}

/* TABLE */
.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 15px 35px rgba(0,0,0,0.1);
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  padding:28px 25px;
  border-bottom:1px solid #eee;
  align-items:center;
}

.row.header{
  background:#0f2a66;
  color:white;
  font-size:13px;
  font-weight:700;
}

/* CURRENCY */
.name{
  font-size:32px;
  font-weight:900;
}

/* BUY */
.buy{
  text-align:center;
  font-size:46px;
  font-weight:900;
  transition:0.2s;
}

/* SELL */
.sell{
  text-align:right;
  font-size:46px;
  font-weight:900;
}

/* COLORS */
.up{ color:#16a34a; }
.down{ color:#dc2626; }

/* FLASH */
.flash{
  animation:flash 0.25s ease;
}

@keyframes flash{
  0%{transform:scale(1.1); opacity:0.3;}
  100%{transform:scale(1); opacity:1;}
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/5/5b/Kazpost_logo.svg">

  <div class="brand">PRO MAX FINTECH SYSTEM</div>

  <img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://your-site.com">

  <div class="bottom">LIVE • BANK GRADE SYSTEM</div>

</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
  <h1>LIVE VALYUTA</h1>
  <div class="time" id="time">--:--</div>
</div>

<div class="card">

  <div class="row header">
    <div>ВАЛЮТА</div>
    <div style="text-align:center">САТЫП АЛУ</div>
    <div style="text-align:right">САТУ</div>
  </div>

  <div class="row">
    <div class="name">USD</div>
    <div class="buy" id="usdBuy">464</div>
    <div class="sell" id="usdSell">471</div>
  </div>

  <div class="row">
    <div class="name">EUR</div>
    <div class="buy" id="eurBuy">546</div>
    <div class="sell" id="eurSell">556</div>
  </div>

  <div class="row">
    <div class="name">RUB</div>
    <div class="buy" id="rubBuy">6.0</div>
    <div class="sell" id="rubSell">6.3</div>
  </div>

</div>

</div>

<script>
setInterval(()=>{
  document.getElementById("time").innerText = new Date().toLocaleTimeString();
},1000);
</script>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "currency-live-d633e.firebaseapp.com",
  projectId: "currency-live-d633e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ref = doc(db,"rates","Vt6Ibuny1gDsyRJfCKLx");

let prev = {};

/* UPDATE ENGINE */
function setVal(id,val){
  const el = document.getElementById(id);

  if(prev[id] !== undefined){

    if(val > prev[id]){
      el.className = "buy up";
      el.innerHTML = val + " ↑";
    }

    else if(val < prev[id]){
      el.className = "buy down";
      el.innerHTML = val + " ↓";
    }

    else{
      el.className = "buy";
      el.innerHTML = val;
    }

  } else {
    el.innerHTML = val;
  }

  el.classList.add("flash");
  setTimeout(()=>el.classList.remove("flash"),250);

  prev[id] = val;
}

/* LIVE DATA */
onSnapshot(ref,(snap)=>{
  const d = snap.data();

  setVal("usdBuy",d.usdBuy);
  setVal("usdSell",d.usdSell);

  setVal("eurBuy",d.eurBuy);
  setVal("eurSell",d.eurSell);

  setVal("rubBuy",d.rubBuy);
  setVal("rubSell",d.rubSell);
});

</script>

</body>
</html>
