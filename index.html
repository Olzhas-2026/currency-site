<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVE BANK VALYUTA</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#eef2f7,#dfe7f3);
  text-align:center;
  padding:20px;
}

.header{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}

.logo{
  width:40px;height:40px;
  background:#0057b8;
  border-radius:10px;
}

h1{color:#0057b8;font-size:22px;}

.card{
  background:white;
  margin:12px auto;
  padding:18px;
  max-width:340px;
  border-radius:14px;
  border-left:6px solid #0057b8;
}

.buy{color:green;font-weight:bold;}
.sell{color:red;font-weight:bold;}

#admin{
  display:none;
  margin-top:20px;
  padding:15px;
  background:#111;
  color:white;
  max-width:340px;
  margin:auto;
  border-radius:12px;
}

input,button{
  width:90%;
  padding:10px;
  margin:6px;
  border-radius:8px;
  border:none;
}

button{background:#0057b8;color:white;}
.logout{background:red;}
</style>
</head>

<body>

<div class="header">
  <div class="logo"></div>
  <h1>LIVE VALYUTA</h1>
</div>

<div class="card">
USD BUY: <span id="usdBuy">...</span><br>
USD SELL: <span id="usdSell">...</span>
</div>

<div class="card">
EUR BUY: <span id="eurBuy">...</span><br>
EUR SELL: <span id="eurSell">...</span>
</div>

<div class="card">
RUB BUY: <span id="rubBuy">...</span><br>
RUB SELL: <span id="rubSell">...</span>
</div>

<hr>

<input type="password" id="pass" placeholder="Admin password">
<button onclick="login()">Login</button>

<div id="admin">

<h3>Admin Panel</h3>

<input id="usdBuyInput" placeholder="USD BUY">
<input id="usdSellInput" placeholder="USD SELL">

<input id="eurBuyInput" placeholder="EUR BUY">
<input id="eurSellInput" placeholder="EUR SELL">

<input id="rubBuyInput" placeholder="RUB BUY">
<input id="rubSellInput" placeholder="RUB SELL">

<button onclick="save()">Save</button>
<button class="logout" onclick="logout()">Logout</button>

<p id="status"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  doc,
  onSnapshot,
  updateDoc,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "currency-live-d633e.firebaseapp.com",
  projectId: "currency-live-d633e",
  storageBucket: "currency-live-d633e.firebasestorage.app",
  messagingSenderId: "1086647236449",
  appId: "1:1086647236449:web:df6eee1cdec5280ee1b720"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ref = doc(db, "rates", "Vt6Ibuny1gDsyRJfCKLx");

/* LIVE */
onSnapshot(ref,(snap)=>{
  if(!snap.exists()) return;

  const d = snap.data();

  usdBuy.innerText=d.usdBuy;
  usdSell.innerText=d.usdSell;

  eurBuy.innerText=d.eurBuy;
  eurSell.innerText=d.eurSell;

  rubBuy.innerText=d.rubBuy;
  rubSell.innerText=d.rubSell;
});

/* LOGIN */
window.login=function(){
  if(pass.value==="1234"){
    admin.style.display="block";
  } else {
    alert("Wrong password");
  }
};

/* SAVE (🔥 FIXED 100%) */
window.save = async function(){

  const data = {
    usdBuy: Number(usdBuyInput.value)||0,
    usdSell: Number(usdSellInput.value)||0,

    eurBuy: Number(eurBuyInput.value)||0,
    eurSell: Number(eurSellInput.value)||0,

    rubBuy: Number(rubBuyInput.value)||0,
    rubSell: Number(rubSellInput.value)||0,
  };

  try {

    const docSnap = await getDoc(ref);

    if (docSnap.exists()) {
      await updateDoc(ref, data);
    } else {
      await setDoc(ref, data); // 🔥 CREATE if not exists
    }

    status.innerText="✅ Saved successfully";

    document.querySelectorAll("#admin input").forEach(i=>i.value="");

  } catch(e){
    console.log(e);
    status.innerText="❌ Firebase error (rules check)";
  }
};

/* LOGOUT */
window.logout=function(){
  admin.style.display="none";
  pass.value="";
};

</script>

</body>
</html>
