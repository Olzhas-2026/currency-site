<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QAZPOST Exchange System</title>

<style>

html, body{
  height:100%;
  margin:0;
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  font-feature-settings: "tnum" 1;
  -webkit-font-smoothing: antialiased;
  text-rendering: geometricPrecision;
  background:#0b1633;
}

body{
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:280px;
  background:linear-gradient(180deg,#06122a,#071a3a);
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:30px 20px;
}

/* ?? LOGO ?ДЕМІРЕК */
.logo{
  width:190px;
  margin-top:20px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.25);
  transition:0.3s ease;
}

.logo:hover{
  transform:scale(1.05);
}

.brand{
  margin-top:15px;
  font-size:24px;
  font-weight:900;
  color:#00d4ff;
  letter-spacing:2px;
}

.subtitle{
  font-size:11px;
  opacity:0.6;
  text-align:center;
}

.qr{
  margin-top:50px;
  width:140px;
  background:white;
  padding:10px;
  border-radius:10px;
}

.side-footer{
  margin-top:auto;
  font-size:10px;
  opacity:0.5;
}

/* MAIN */
.main{
  flex:1;
  background:#f4f6fb;
  padding:25px 35px;
  display:flex;
  flex-direction:column;
}

.topbar{
  display:flex;
  justify-content:flex-end;
  margin-bottom:10px;
}

.time{
  font-size:14px;
  color:#555;
  font-weight:600;
}

.banner{
  background:linear-gradient(90deg,#0f2a66,#1e4ed8);
  color:white;
  padding:28px 20px;
  border-radius:14px;
  text-align:center;
  font-size:34px;
  font-weight:900;
  margin-bottom:12px;
}

.info{
  text-align:center;
  font-size:20px;
  font-weight:800;
  color:#1e4ed8;
  margin-bottom:25px;
}

/* TABLE */
.card{
  background:white;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 20px 45px rgba(0,0,0,0.12);
  width:100%;
  max-width:900px;
  margin:auto;
}

.row.header{
  background:#0f2a66;
  color:white;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  padding:18px 25px;
  font-size:14px;
  font-weight:800;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  padding:34px 25px;
  border-bottom:1px solid #eee;
  align-items:center;
}

.name{
  font-size:44px;
  font-weight:900;
  color:#111;
}

.buy, .sell{
  font-family: system-ui, "Segoe UI", monospace;
  font-variant-numeric: tabular-nums;
  font-size:60px;
  font-weight:900;
}

.buy{
  text-align:center;
  color:#16a34a;
}

.sell{
  text-align:right;
  color:#dc2626;
}

/* SLOGAN */
.slogan-box{
  margin-top:25px;
  text-align:center;
  padding:20px;
}

.slogan{
  font-size:26px;
  font-weight:900;
  color:#0f2a66;
  white-space:nowrap;
  letter-spacing:0.2px;
}

</style>
</head>

<body>

<div class="sidebar">

  <!-- ?? ЛОГОТИП ОСЫ ЖЕРДЕ АУЫСТЫРЫЛДЫ -->
  <img class="logo" src="logo.png">

  <div class="brand">QAZPOST</div>
  <div class="subtitle">FINTECH EXCHANGE SYSTEM</div>

  <img class="qr"
       src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=https://your-site.com">

  <div class="side-footer">LIVE SYSTEM</div>

</div>

<div class="main">

<div class="topbar">
  <div class="time" id="time">--:--</div>
</div>

<div class="banner">
  QAZPOST – сенімді ?аржы серіктесі / надёжный финансовый партнёр
</div>

<div class="info">
  ?? Ба?а тиімді • Сенімді айырбас / Выгодный курс • Надёжный обмен
</div>

<div class="card">

  <div class="row header">
    <div>ВАЛЮТА</div>
    <div style="text-align:center">САТЫП АЛУ</div>
    <div style="text-align:right">САТУ</div>
  </div>

  <div class="row">
    <div class="name">USD</div>
    <div class="buy">464</div>
    <div class="sell">471</div>
  </div>

  <div class="row">
    <div class="name">EUR</div>
    <div class="buy">546</div>
    <div class="sell">556</div>
  </div>

  <div class="row">
    <div class="name">RUB</div>
    <div class="buy">6.0</div>
    <div class="sell">6.3</div>
  </div>

</div>

<div class="slogan-box">
  <div class="slogan">
    Болаша?ы?ды б?гіннен бас?ар / Управляй будущим уже сегодня
  </div>
</div>

</div>

<script>
setInterval(()=>{
  document.getElementById("time").innerText = new Date().toLocaleTimeString();
},1000);
</script>

</body>
</html>
