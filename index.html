<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRO TRADING TERMINAL</title>

<style>

body{
  margin:0;
  background:#050b1a;
  font-family: "Courier New", monospace;
  color:#00ffcc;
  display:flex;
  height:100vh;
}

/* LEFT PANEL */
.left{
  width:300px;
  background:#07142e;
  padding:25px;
  border-right:2px solid #0ff;
}

.logo{
  width:140px;
  filter:drop-shadow(0 0 10px #0ff);
}

.status{
  margin-top:20px;
  font-size:12px;
  color:#0ff;
}

/* MAIN */
.main{
  flex:1;
  padding:25px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #0ff;
  padding-bottom:10px;
}

.header h1{
  font-size:22px;
  color:#0ff;
  text-shadow:0 0 10px #0ff;
}

.time{
  color:#0ff;
  font-size:14px;
}

/* TABLE */
.table{
  margin-top:20px;
  border:1px solid #0ff;
  border-radius:8px;
  overflow:hidden;
}

/* ROW */
.row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  padding:18px;
  border-bottom:1px solid rgba(0,255,204,0.2);
}

/* HEADER ROW */
.row.head{
  background:rgba(0,255,204,0.1);
  font-weight:bold;
}

/* TEXT */
.name{
  font-size:22px;
  color:#0ff;
}

.buy{
  text-align:center;
  font-size:28px;
  color:#00ff66;
  transition:0.2s;
}

.sell{
  text-align:right;
  font-size:28px;
  color:#ff3355;
  transition:0.2s;
}

/* ANIMATION */
.flash{
  animation:flash 0.3s ease;
}

@keyframes flash{
  0%{transform:scale(1.2); opacity:0.4;}
  100%{transform:scale(1); opacity:1;}
}

.up{color:#00ff66;}
.down{color:#ff3355;}

</style>
</head>

<body>

<div class="left">

  <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/5/5b/Kazpost_logo.svg">

  <div class="status">SYSTEM: ONLINE 🟢</div>
  <div class="status">MODE: TRADING LIVE</div>
  <div class="status">SYNC: FIREBASE REALTIME</div>

</div>

<div class="main">

  <div class="header">
    <h1>TRADING TERMINAL</h1>
    <div class="time" id="time">--:--</div>
  </div>

  <div class="table">

    <div class="row head">
      <div>ASSET</div>
      <div style="text-align:center">BUY</div>
      <div style="text-align:right">SELL</div>
    </div>

    <div class="row">
      <div class="name">USD</div>
      <div class="buy" id="usdBuy">464</div>
      <div class="sell" id="usdSell">471</div>
    </div>

    <div class="row">
      <div class="name">EUR</div>
      <div class="buy" id="eurBuy">546</div>
      <div class="sell" id="eurSell">556</div>
    </div>

    <div class="row">
      <div class="name">RUB</div>
      <div class="buy" id="rubBuy">6.0</div>
      <div class="sell" id="rubSell">6.3</div>
    </div>

  </div>

</div>

<script>
setInterval(()=>{
  document.getElementById("time").innerText = new Date().toLocaleTimeString();
},1000);
</script>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "currency-live-d633e.firebaseapp.com",
  projectId: "currency-live-d633e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ref = doc(db,"rates","Vt6Ibuny1gDsyRJfCKLx");

let prev = {};

function update(id,val){
  const el = document.getElementById(id);

  if(prev[id] !== undefined){

    if(val > prev[id]){
      el.className = "buy up";
      el.innerHTML = val + " ↑";
    } 
    else if(val < prev[id]){
      el.className = "buy down";
      el.innerHTML = val + " ↓";
    } 
    else{
      el.className = "buy";
      el.innerHTML = val;
    }
  } 
  else{
    el.innerHTML = val;
  }

  el.classList.add("flash");
  setTimeout(()=>el.classList.remove("flash"),300);

  prev[id] = val;
}

/* LIVE */
onSnapshot(ref,(snap)=>{
  const d = snap.data();

  update("usdBuy",d.usdBuy);
  update("usdSell",d.usdSell);

  update("eurBuy",d.eurBuy);
  update("eurSell",d.eurSell);

  update("rubBuy",d.rubBuy);
  update("rubSell",d.rubSell);
});

</script>

</body>
</html>
