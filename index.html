<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVE VALYUTA</title>

<style>

body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0a1a3a;
  display:flex;
}

/* LEFT PANEL */
.sidebar{
  width:220px;
  background:#08122b;
  color:white;
  text-align:center;
  padding:20px;
}

.logo{
  width:80px;
  margin:20px auto;
}

.qr{
  margin-top:40px;
  width:120px;
}

/* MAIN */
.main{
  flex:1;
  background:#f3f5f8;
  padding:20px 30px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.title{
  font-size:32px;
  font-weight:bold;
  color:#2d5bd1;
}

.time{
  font-size:14px;
  color:gray;
}

/* TABLE */
.table{
  background:white;
  border-radius:10px;
  overflow:hidden;
}

.row{
  display:grid;
  grid-template-columns: 1fr 1fr 1fr;
  padding:20px;
  border-bottom:1px solid #eee;
  align-items:center;
}

.row.header{
  background:#f0f3fa;
  font-weight:bold;
}

.name{
  font-size:28px;
  font-weight:bold;
}

.buy{
  text-align:center;
  font-size:40px;
  font-weight:bold;
}

.sell{
  text-align:right;
  font-size:40px;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="sidebar">
  <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/5/5b/Kazpost_logo.svg">
  
  <img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://your-site.com">
</div>

<div class="main">

<div class="header">
  <div class="title">LIVE VALYUTA</div>
  <div class="time" id="time">--:--</div>
</div>

<div class="table">

  <div class="row header">
    <div></div>
    <div style="text-align:center">САТЫП АЛУ</div>
    <div style="text-align:right">САТУ</div>
  </div>

  <div class="row">
    <div class="name">USD</div>
    <div class="buy" id="usdBuy">...</div>
    <div class="sell" id="usdSell">...</div>
  </div>

  <div class="row">
    <div class="name">EUR</div>
    <div class="buy" id="eurBuy">...</div>
    <div class="sell" id="eurSell">...</div>
  </div>

  <div class="row">
    <div class="name">RUB</div>
    <div class="buy" id="rubBuy">...</div>
    <div class="sell" id="rubSell">...</div>
  </div>

  <div class="row">
    <div class="name">KGS</div>
    <div class="buy">5.25</div>
    <div class="sell">5.65</div>
  </div>

  <div class="row">
    <div class="name">CNY</div>
    <div class="buy">67.00</div>
    <div class="sell">73.00</div>
  </div>

</div>

</div>

<script>

/* уақыт */
setInterval(()=>{
  const now = new Date();
  time.innerText = now.toLocaleTimeString();
},1000);

</script>

</body>
</html>
