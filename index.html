<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kazpost Exchange</title>

<style>

body{
  margin:0;
  font-family: Arial, sans-serif;
  display:flex;
  background:#0b1633;
}

/* LEFT SIDEBAR */
.sidebar{
  width:280px;
  background:#07142e;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:30px 20px;
}

.logo{
  width:150px;
  margin-top:30px;
}

.brand{
  margin-top:15px;
  font-size:16px;
  font-weight:900;
  letter-spacing:3px;
}

.subtitle{
  font-size:11px;
  opacity:0.6;
  margin-top:5px;
  text-align:center;
}

/* QR */
.qr{
  margin-top:50px;
  width:140px;
  background:white;
  padding:10px;
  border-radius:10px;
}

/* FOOTER */
.side-footer{
  margin-top:auto;
  font-size:10px;
  opacity:0.5;
  text-align:center;
}

/* MAIN */
.main{
  flex:1;
  background:#f3f5f9;
  padding:25px 35px;
}

/* HEADER */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.title{
  font-size:34px;
  font-weight:900;
  color:#1e4ed8;
  letter-spacing:1px;
}

.time{
  font-size:14px;
  color:#666;
}

/* TABLE */
.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 15px 35px rgba(0,0,0,0.12);
}

/* HEADER ROW */
.row.header{
  background:#0f2a66;
  color:white;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  padding:18px 25px;
  font-size:13px;
  font-weight:700;
}

/* ROW */
.row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  padding:30px 25px;
  border-bottom:1px solid #eee;
  align-items:center;
}

/* CURRENCY NAME */
.name{
  font-size:34px;
  font-weight:900;
  color:#111;
}

/* BUY */
.buy{
  text-align:center;
  font-size:48px;
  font-weight:900;
  color:#16a34a;
}

/* SELL */
.sell{
  text-align:right;
  font-size:48px;
  font-weight:900;
  color:#dc2626;
}

/* LIVE EFFECT */
.flash{
  animation:flash 0.25s ease;
}

@keyframes flash{
  0%{transform:scale(1.1); opacity:0.3;}
  100%{transform:scale(1); opacity:1;}
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <!-- KAZPOST LOGO -->
  <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/5/5b/Kazpost_logo.svg">

  <div class="brand">KAZPOST</div>
  <div class="subtitle">EXCHANGE RATE SYSTEM</div>

  <!-- QR -->
  <img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=https://your-site.com">

  <div class="side-footer">© LIVE FINTECH SYSTEM</div>

</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
  <div class="title">LIVE VALYUTA</div>
  <div class="time" id="time">--:--</div>
</div>

<div class="card">

  <!-- HEADER -->
  <div class="row header">
    <div>ВАЛЮТА</div>
    <div style="text-align:center">САТЫП АЛУ</div>
    <div style="text-align:right">САТУ</div>
  </div>

  <!-- USD -->
  <div class="row">
    <div class="name">USD</div>
    <div class="buy" id="usdBuy">464</div>
    <div class="sell" id="usdSell">471</div>
  </div>

  <!-- EUR -->
  <div class="row">
    <div class="name">EUR</div>
    <div class="buy" id="eurBuy">546</div>
    <div class="sell" id="eurSell">556</div>
  </div>

  <!-- RUB -->
  <div class="row">
    <div class="name">RUB</div>
    <div class="buy" id="rubBuy">6.0</div>
    <div class="sell" id="rubSell">6.3</div>
  </div>

</div>

</div>

<script>
setInterval(()=>{
  document.getElementById("time").innerText = new Date().toLocaleTimeString();
},1000);
</script>

</body>
</html>
