<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QAZPOST Exchange System</title>

<style>
html, body{
  height:100%;
  margin:0;
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  background:#0b1633;
}

body{ display:flex; }

.sidebar{
  width:280px;
  background:linear-gradient(180deg,#06122a,#071a3a);
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:30px 20px;
}

.logo{
  width:200px;
  background:white;
  padding:12px;
  border-radius:16px;
  box-shadow:0 15px 35px rgba(0,0,0,0.35);
  margin-top:10px;
}

.brand{
  margin-top:15px;
  font-size:24px;
  font-weight:900;
  color:#00d4ff;
}

.qr{
  margin-top:40px;
  width:140px;
  background:white;
  padding:10px;
  border-radius:10px;
}

.main{
  flex:1;
  background:#f4f6fb;
  padding:25px;
}

.card{
  background:white;
  border-radius:14px;
  box-shadow:0 20px 45px rgba(0,0,0,0.12);
  max-width:900px;
  margin:auto;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  padding:25px;
  border-bottom:1px solid #eee;
}

.name{ font-size:40px; font-weight:900; }
.buy{ text-align:center; color:#16a34a; font-size:50px; font-weight:900; }
.sell{ text-align:right; color:#dc2626; font-size:50px; font-weight:900; }
</style>
</head>

<body>

<div class="sidebar">
  <img class="logo" src="kazpost.png">
  <div class="brand">QAZPOST</div>

  <img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=https://your-site.com">
</div>

<div class="main">

<div class="card">

  <div class="row">
    <div class="name">USD</div>
    <div class="buy" id="usdBuy">---</div>
    <div class="sell" id="usdSell">---</div>
  </div>

  <div class="row">
    <div class="name">EUR</div>
    <div class="buy" id="eurBuy">---</div>
    <div class="sell" id="eurSell">---</div>
  </div>

  <div class="row">
    <div class="name">RUB</div>
    <div class="buy" id="rubBuy">---</div>
    <div class="sell" id="rubSell">---</div>
  </div>

</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCxY06NTpnfifUOzPNUsQWMx2pG_PKSagI",
  authDomain: "currency-live-d633e.firebaseapp.com",
  projectId: "currency-live-d633e",
  storageBucket: "currency-live-d633e.firebasestorage.app",
  messagingSenderId: "1086647236449",
  appId: "1:1086647236449:web:df6eee1cdec5280ee1b720"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const docRef = db.collection("rates").doc("Vt6Ibuny1gDsyRJfCKLx");

/* 🔥 LIVE LISTENER (ONLY READ) */
docRef.onSnapshot((doc)=>{
  if(!doc.exists) return;

  const d = doc.data();

  usdBuy.innerText = d.usdBuy;
  usdSell.innerText = d.usdSell;

  eurBuy.innerText = d.eurBuy;
  eurSell.innerText = d.eurSell;

  rubBuy.innerText = d.rubBuy;
  rubSell.innerText = d.rubSell;
});

/* 🔐 SAFE SAVE (NO OVERWRITE BUG) */
function saveRates(){

  const data = {
    usdBuy: Number(usdBuyIn.value),
    usdSell: Number(usdSellIn.value),

    eurBuy: Number(eurBuyIn.value),
    eurSell: Number(eurSellIn.value),

    rubBuy: Number(rubBuyIn.value),
    rubSell: Number(rubSellIn.value)
  };

  docRef.update(data)   // 👈 IMPORTANT FIX (NOT set)
  .then(()=>{
    alert("Saved!");
    adminPanel.style.display="none";
  });
}
</script>

<!-- ADMIN -->
<div style="position:fixed;bottom:20px;right:20px;">
<button onclick="adminPanel.style.display='block'" style="background:#1e4ed8;color:white;">Admin</button>
</div>

<div id="adminPanel" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);">

<div style="background:white;width:300px;margin:100px auto;padding:15px;border-radius:10px;">

<input id="usdBuyIn" placeholder="USD BUY"><br><br>
<input id="usdSellIn" placeholder="USD SELL"><br><br>

<input id="eurBuyIn"><br><br>
<input id="eurSellIn"><br><br>

<input id="rubBuyIn"><br><br>
<input id="rubSellIn"><br><br>

<button onclick="saveRates()">SAVE</button>

</div>
</div>

</body>
</html>
</html>
