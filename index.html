<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QAZPOST Exchange System</title>

<style>
html, body{
  height:100%;
  margin:0;
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  background:#0b1633;
}

body{ display:flex; }

.sidebar{
  width:280px;
  background:linear-gradient(180deg,#06122a,#071a3a);
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:30px 20px;
}

.logo{
  width:200px;
  background:white;
  padding:12px;
  border-radius:16px;
  box-shadow:0 15px 35px rgba(0,0,0,0.35);
  transition:0.3s ease;
  margin-top:10px;
}

.logo:hover{ transform:scale(1.07); }

.brand{
  margin-top:15px;
  font-size:24px;
  font-weight:900;
  color:#00d4ff;
  letter-spacing:2px;
}

.subtitle{
  font-size:11px;
  opacity:0.6;
  text-align:center;
  margin-top:5px;
}

.qr{
  margin-top:40px;
  width:140px;
  background:white;
  padding:10px;
  border-radius:10px;
}

.side-footer{
  margin-top:auto;
  font-size:10px;
  opacity:0.5;
}

.main{
  flex:1;
  background:#f4f6fb;
  padding:25px;
  display:flex;
  flex-direction:column;
}

.card{
  background:white;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 20px 45px rgba(0,0,0,0.12);
  width:100%;
  max-width:900px;
  margin:auto;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  padding:30px;
  border-bottom:1px solid #eee;
}

.name{ font-size:40px; font-weight:900; color:#111; }
.buy{ text-align:center; color:#16a34a; font-size:55px; font-weight:900; }
.sell{ text-align:right; color:#dc2626; font-size:55px; font-weight:900; }

/* ADMIN BUTTON */
.admin-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#1e4ed8;
  color:white;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* PANEL */
#adminPanel{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
}

.panel-box{
  background:white;
  width:320px;
  margin:120px auto;
  padding:15px;
  border-radius:12px;
}

.panel-box input{
  width:100%;
  padding:8px;
  margin:5px 0;
}
</style>
</head>

<body>

<!-- SIDEBAR (ДИЗАЙН САҚТАЛҒАН) -->
<div class="sidebar">
  <img class="logo" src="kazpost.png">
  <div class="brand">QAZPOST</div>
  <div class="subtitle">FINTECH EXCHANGE SYSTEM</div>

  <img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=https://your-site.com">

  <div class="side-footer">LIVE SYSTEM</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="card">

  <div class="row">
    <div class="name">USD</div>
    <div class="buy" id="usdBuy">464</div>
    <div class="sell" id="usdSell">471</div>
  </div>

  <div class="row">
    <div class="name">EUR</div>
    <div class="buy" id="eurBuy">546</div>
    <div class="sell" id="eurSell">556</div>
  </div>

  <div class="row">
    <div class="name">RUB</div>
    <div class="buy" id="rubBuy">6.0</div>
    <div class="sell" id="rubSell">6.3</div>
  </div>

</div>
</div>

<!-- ADMIN BUTTON -->
<button class="admin-btn" onclick="openPanel()">ADMIN</button>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <div class="panel-box">

    <input id="usdBuyIn" placeholder="USD BUY">
    <input id="usdSellIn" placeholder="USD SELL">

    <input id="eurBuyIn" placeholder="EUR BUY">
    <input id="eurSellIn" placeholder="EUR SELL">

    <input id="rubBuyIn" placeholder="RUB BUY">
    <input id="rubSellIn" placeholder="RUB SELL">

    <button onclick="saveRates()">SAVE</button>
    <button onclick="closePanel()">CLOSE</button>

  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCxY06NTpnfifUOzPNUsQWMx2pG_PKSagI",
  authDomain: "currency-live-d633e.firebaseapp.com",
  projectId: "currency-live-d633e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const docRef = db.collection("rates").doc("Vt6Ibuny1gDsyRJfCKLx");

/* LIVE */
docRef.onSnapshot((doc)=>{
  if(!doc.exists) return;
  const d = doc.data();

  usdBuy.innerText = d.usdBuy;
  usdSell.innerText = d.usdSell;

  eurBuy.innerText = d.eurBuy;
  eurSell.innerText = d.eurSell;

  rubBuy.innerText = d.rubBuy;
  rubSell.innerText = d.rubSell;
});

/* SAVE FIXED */
function saveRates(){
  docRef.set({
    usdBuy: Number(usdBuyIn.value),
    usdSell: Number(usdSellIn.value),

    eurBuy: Number(eurBuyIn.value),
    eurSell: Number(eurSellIn.value),

    rubBuy: Number(rubBuyIn.value),
    rubSell: Number(rubSellIn.value)
  }, { merge:true });

  alert("Saved");
  closePanel();
}

/* PANEL */
function openPanel(){
  adminPanel.style.display = "block";
}
function closePanel(){
  adminPanel.style.display = "none";
}
</script>

</body>
</html>
