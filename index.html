<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QAZPOST Exchange System</title>

<style>
html, body{
  height:100%;
  margin:0;
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  background:#0b1633;
}

body{ display:flex; }

.sidebar{
  width:280px;
  background:linear-gradient(180deg,#06122a,#071a3a);
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:30px 20px;
}

.logo{
  width:200px;
  background:white;
  padding:12px;
  border-radius:16px;
  box-shadow:0 15px 35px rgba(0,0,0,0.35);
  transition:0.3s ease;
  margin-top:10px;
}

.logo:hover{ transform:scale(1.07); }

.brand{
  margin-top:15px;
  font-size:24px;
  font-weight:900;
  color:#00d4ff;
  letter-spacing:2px;
}

.subtitle{
  font-size:11px;
  opacity:0.6;
  text-align:center;
  margin-top:5px;
}

.qr{
  margin-top:40px;
  width:140px;
  background:white;
  padding:10px;
  border-radius:10px;
}

.side-footer{
  margin-top:auto;
  font-size:10px;
  opacity:0.5;
}

.main{
  flex:1;
  background:#f4f6fb;
  padding:25px;
  display:flex;
  flex-direction:column;
}

.topbar{
  display:flex;
  justify-content:flex-end;
  margin-bottom:10px;
}

.time{
  font-size:14px;
  color:#555;
  font-weight:600;
}

.banner{
  background:linear-gradient(90deg,#0f2a66,#1e4ed8);
  color:white;
  padding:28px;
  border-radius:14px;
  text-align:center;
  font-size:32px;
  font-weight:900;
  margin-bottom:12px;
}

.info{
  text-align:center;
  font-size:18px;
  font-weight:700;
  color:#1e4ed8;
  margin-bottom:25px;
}

.card{
  background:white;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 20px 45px rgba(0,0,0,0.12);
  width:100%;
  max-width:900px;
  margin:auto;
}

.row.header{
  background:#0f2a66;
  color:white;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  padding:18px;
  font-size:14px;
  font-weight:800;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  padding:30px;
  border-bottom:1px solid #eee;
  align-items:center;
}

.name{ font-size:40px; font-weight:900; color:#111; }
.buy{ text-align:center; color:#16a34a; font-size:55px; font-weight:900; }
.sell{ text-align:right; color:#dc2626; font-size:55px; font-weight:900; }

.slogan-box{
  margin-top:25px;
  text-align:center;
  padding:20px;
}

.slogan{
  font-size:24px;
  font-weight:900;
  color:#0f2a66;
  white-space:nowrap;
}
</style>
</head>

<body>

<div class="sidebar">
  <img class="logo" src="kazpost.png">
  <div class="brand">QAZPOST</div>
  <div class="subtitle">FINTECH EXCHANGE SYSTEM</div>

  <img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=https://your-site.com">

  <div class="side-footer">LIVE SYSTEM</div>
</div>

<div class="main">

<div class="topbar">
  <div class="time" id="time">--:--</div>
</div>

<div class="banner">
  QAZPOST – сенімді қаржы серіктесі / надёжный финансовый партнёр
</div>

<div class="info">
  💡 Баға тиімді • Сенімді айырбас / Выгодный курс • Надёжный обмен
</div>

<div class="card">

  <div class="row header">
    <div>ВАЛЮТА</div>
    <div style="text-align:center">САТЫП АЛУ</div>
    <div style="text-align:right">САТУ</div>
  </div>

  <div class="row">
    <div class="name">USD</div>
    <div class="buy" id="usdBuy">464</div>
    <div class="sell" id="usdSell">471</div>
  </div>

  <div class="row">
    <div class="name">EUR</div>
    <div class="buy" id="eurBuy">546</div>
    <div class="sell" id="eurSell">556</div>
  </div>

  <div class="row">
    <div class="name">RUB</div>
    <div class="buy" id="rubBuy">6.0</div>
    <div class="sell" id="rubSell">6.3</div>
  </div>

</div>

<div class="slogan-box">
  <div class="slogan">
    Болашағыңды бүгіннен басқар / Управляй будущим уже сегодня
  </div>
</div>

</div>

<script>
setInterval(()=>{
  document.getElementById("time").innerText = new Date().toLocaleTimeString();
},1000);
</script>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "currency-live"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ✅ ДҰРЫС ЖҰМЫС ІСТЕЙТІН LIVE DATA
db.collection("rates").doc("Vt6Ibuny1gDsyRJfCKLx")
.onSnapshot((doc)=>{
  if(!doc.exists) return;

  const data = doc.data();

  if(data.usdBuy !== undefined) document.getElementById("usdBuy").innerText = data.usdBuy;
  if(data.usdSell !== undefined) document.getElementById("usdSell").innerText = data.usdSell;

  if(data.eurBuy !== undefined) document.getElementById("eurBuy").innerText = data.eurBuy;
  if(data.eurSell !== undefined) document.getElementById("eurSell").innerText = data.eurSell;

  if(data.rubBuy !== undefined) document.getElementById("rubBuy").innerText = data.rubBuy;
  if(data.rubSell !== undefined) document.getElementById("rubSell").innerText = data.rubSell;
});
</script>

</body>
</html>
