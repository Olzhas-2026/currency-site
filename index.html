<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVE VALYUTA</title>

<style>
body{
  font-family: Arial;
  background:#f3f6fb;
  text-align:center;
  padding:20px;
}

.card{
  background:white;
  max-width:340px;
  margin:10px auto;
  padding:15px;
  border-radius:12px;
  border-left:6px solid #0057b8;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.title{color:#0057b8;font-weight:bold;font-size:18px;}

.buy{color:green;font-weight:bold;}
.sell{color:red;font-weight:bold;}

#admin{
  display:none;
  background:#111;
  color:white;
  max-width:340px;
  margin:20px auto;
  padding:15px;
  border-radius:12px;
}

input,button{
  width:90%;
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button{
  background:#0057b8;
  color:white;
  cursor:pointer;
}

.logout{background:red;}
#status{font-size:14px;}
</style>
</head>

<body>

<h2>💱 LIVE VALYUTA</h2>

<div class="card">
<div class="title">USD</div>
<div class="buy">BUY: <span id="usdBuy">...</span></div>
<div class="sell">SELL: <span id="usdSell">...</span></div>
</div>

<div class="card">
<div class="title">EUR</div>
<div class="buy">BUY: <span id="eurBuy">...</span></div>
<div class="sell">SELL: <span id="eurSell">...</span></div>
</div>

<div class="card">
<div class="title">RUB</div>
<div class="buy">BUY: <span id="rubBuy">...</span></div>
<div class="sell">SELL: <span id="rubSell">...</span></div>
</div>

<hr>

<input type="password" id="pass" placeholder="Admin password">
<button onclick="login()">Login</button>

<div id="admin">

<h3>Admin Panel</h3>

<input id="usdBuyInput" placeholder="USD BUY">
<input id="usdSellInput" placeholder="USD SELL">

<input id="eurBuyInput" placeholder="EUR BUY">
<input id="eurSellInput" placeholder="EUR SELL">

<input id="rubBuyInput" placeholder="RUB BUY">
<input id="rubSellInput" placeholder="RUB SELL">

<button onclick="save()">Save</button>
<button class="logout" onclick="logout()">Logout</button>

<p id="status"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  doc,
  onSnapshot,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE (өзінікін қой) */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "currency-live-d633e.firebaseapp.com",
  projectId: "currency-live-d633e",
  storageBucket: "currency-live-d633e.firebasestorage.app",
  messagingSenderId: "1086647236449",
  appId: "1:1086647236449:web:df6eee1cdec5280ee1b720"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ref = doc(db,"rates","Vt6Ibuny1gDsyRJfCKLx");

/* LIVE */
onSnapshot(ref,(snap)=>{
  if(!snap.exists()) return;

  const d = snap.data();

  usdBuy.innerText = d.usdBuy || 0;
  usdSell.innerText = d.usdSell || 0;

  eurBuy.innerText = d.eurBuy || 0;
  eurSell.innerText = d.eurSell || 0;

  rubBuy.innerText = d.rubBuy || 0;
  rubSell.innerText = d.rubSell || 0;
});

/* LOGIN */
window.login=function(){
  if(pass.value==="1234"){
    admin.style.display="block";
  } else {
    alert("Wrong password");
  }
};

/* SAVE (🔥 100% WORK) */
window.save = async function(){

  const data = {
    usdBuy: Number(usdBuyInput.value)||0,
    usdSell: Number(usdSellInput.value)||0,
    eurBuy: Number(eurBuyInput.value)||0,
    eurSell: Number(eurSellInput.value)||0,
    rubBuy: Number(rubBuyInput.value)||0,
    rubSell: Number(rubSellInput.value)||0,
  };

  try{

    // 🔥 setDoc = 100% save (error болмайды)
    await setDoc(ref, data);

    status.innerText="✅ Saved successfully";

    document.querySelectorAll("#admin input").forEach(i=>i.value="");

  }catch(e){
    console.log(e);
    status.innerText="❌ Firebase error (rules check)";
  }
};

/* LOGOUT */
window.logout=function(){
  admin.style.display="none";
  pass.value="";
};

</script>

</body>
</html>
